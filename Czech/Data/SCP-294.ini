;color = barva tekutiny
;alpha = průhlednost tekutiny (0.0 = průhledná, 1.0 = neprůsvitná)
;glow = true/false, jestli má tekutina zářit

;sound = zvukový soubor který má přehrát když postava vypije tento nápoj
;dispensesound = zvukový soubor který má přehrát když se nápoj vydává (pokud nenastaveno přehraje "SFX\SCP\294\dispense1.ogg")

;message = text ukázaný na obrazovce po vypití nápoje
;refusemessage = text ukázaný na obrazovce po té co postava odmítne vypít tento nápoj (toto musí existovat aby postava nápoj odmítla)

;lethal = true/false, jestli má postavu zabít hned po vypití nápoje
;deathtimer = (pokud není lethal) kolik sekund před tím, než postavu zabije
;explosion = true/false, vytvoří explozi podobnou té na Bráně B když postava vypije tento nápoj
;deathmessage = text zobrazen na obrazovce po smrti pojud tekutina postavu zabije

;blur = kolik sekund zůstane obrazovka rozostřena po vypití nápoje
;vomit = kolik sekund se postava cítí nevolně před tím než se pozvrací
;camerashake = kolik sekund se má obrazovka třepat po vypití nápoje
;damage/injuries = zvýší hodnotu injuries (zranění)
;blood loss = zvýší hodnotu blood loss (ztráta krve)
;stomachache = true/false, má stejný efekt jako apendicitida způsobena SCP-1025 (snížená stamina and zprávy o bolesti břicha)

;stamina effect = mění jak rychle mizí stamina (1.0 = normální rychlost, 2.0 = sníží staminu 2x pomaleji, 0.0 = nesníží staminu vůbec)
;stamina effect timer = kolik sekund než skončí efekt staminy
;blink effect, blink effect timer - ??

