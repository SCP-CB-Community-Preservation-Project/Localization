italic=true
0=<caption=true,italic=false>[Radio Squawk]
0.35=<voice=franklin>Toto je Bezpečnostní šéf Franklin. Doktore Harpe, kopírujete?
6.96=<voice=harp>Toto je Doktor Harp, Jsem uprostřed něčeho, takže buďte rychlý.
11.69=<voice=franklin,length=5.5>Věřím že zpráva o incidentu SCP-106 průlomu toto ráno je pořád na počítači.
18.5=<voice=harp>To je správně. Um, klidně si to přečtěte pokud se dostanete do mé kanceláře.
23.45=<voice=franklin,length=5.5>Mohli bychom si ten soubor přečíst přes intranet zařízení. K tomu samozřejmě budeme potřebovat váš osobní přístupový kód.
30.9=<voice=harp,length=7>Oh jo dobře, um, zní dobře! Um, jak jsem říkal jsem teď celkem zanědprázdněný, Před vysláním Mobile Task Force je krátce instruktujeme.
38.8=<voice=harp>Jak se tam dostanu se tam a dám ti kód. Nemělo by to trvat déle než patnáct minut.
44.1=<voice=franklin,length=6>Omlouvám se, ale ten soubor potřebujeme okamžitě! Chápu, že je to proti bezpečnostnímu protokolu.
