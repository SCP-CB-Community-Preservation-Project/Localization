[Mobilní úderné jednotky]
image path = mtf.jpg
align x = center
align y = center
text1 = Mobilní úderné jednotky (MTF) jsou elitní jednotky složené z pracovníků z celé Nadace a jsou mobilizovány k řešení konkrétních hrozeb nebo situací, které občas překračují provozní kapacitu nebo odborné znalosti terénního personálu. 
text2 = Mohou být přemisťovány mezi zařízeními nebo lokacemi dle potřeby. Členové Mobilní Úderné Jednotky představují ty "nejlepší z nejlepších" z Nadace.
text3 = MTF E-11 ("Nine-Tailed Fox") zajišťuje vnitřní zabezpečení SCP Nadace pod dohledem MTF Alfa-1. Jedná se o speciální operační síly nasazované, když selhávají standardní protokoly a hrozí několikanásobné narušení. Většina jejich činností je utajena.
text4 = Mezi jejich úkoly patří řešení prolomení zadržení opětovným zadržením všech aktivních a nepřátelských instancí SCP, záchrana přeživších zaměstnanců Nadace a terminace veškerých neposlušných zaměstnanců Třídy D.

[Noktovizor]
image path = NVG.jpg
align x = right
align y = top
disablebackground = true
text1 = Standartní noktovizory jsou vydávány Mobilním Úderným Jednotkám v případě výpakdku proudu.
text2 = Jsou též vydávány i vědcům, ale je jim doporučeno se v případně výpadku proudu zaměřili na evakuaci.

[SCP-012]
image path = 012.jpg
align x = right
align y = top
disablebackground = true
text1 = SCP-012 bylo získáno Archeologem K.M. Sandovalem během výkopů v severoitalské hrobce zničené bouří. Objekt je kus ručně psané hudební skladby nazvané "Na hoře Golgotha", zdá se, že jde o větší set papírů a vypadá to, že je nekompletní.
text2 = Červený/černý inkoust, o němž se nejdříve myslelo, že jde o nějaký druh přírodního barviva, byl později identifikován, jako lidská krev z několika subjektů.
text3 = Během následného vyšetřování bylo několika testovacím subjektům dovoleno vstoupit do místnosti s SCP-012. Ve všech případech se subjekty rychle zešíleli a pokusili se použít vlastní krev k dokončení kompozice, což skončilo silnou ztrátou krve a poškozením několika orgánů.

[SCP-035]
image path = 035.jpg
align x = right
align y = top
disablebackground = true
text1 = SCP-035 je bílá porcelánová maska komedie, ovšem občas se změní na tragédii.
text2 = Když je SCP-035 přiloženo na obličej jedince, alternativní vlnový vzorec z SCP-035 přehluší originální, což způsobí mozkovou mrtvici subjektu. Subjekt poté tvrdí, že je vědomí uložené v SCP-035.
text3 = Psychologická analýza ukázala, že SCP-035 má velmi manipulativní povahu a je schopno vynutit vnímatelné změny v psychologickém stavu zaměstantců Nadace. SCP-035 je velmi sadistické a donutilo několik zaměstnanců ke spáchání sebevraždy pouze za pomocí svých slov.

[SCP-049]
image path = 049.jpg
align x = left
align y = center
disablebackground = true
text1 = SCP-049 je humaniodní entita; přesto Nadace v současné době není schopna podrobněji prozkoumat jeho obličej a tělo, protože je pokryto tím, co vypadá jako oděv tradičního Morového doktora z 15. a 16. století v Evropě.
text2 = Dotek SCP-049 je pro lidi ve všech případech smrtelný. Po kontaktu s rukou SCP-049 oběť (dále jen SCP-049-2) utrpí [DATA ZLIKVIDOVÁNA] a během několika okamžiků zemře.
text3 = SCP-049 poté vytáhne pytel vyrobený z [DATA ZLIKVIDOVÁNA] obsahující skalpely, jehlu, nit a několik lahviček s dosud neidentifikovanou látkou a začne SCP-049-2 pitvat a zároveň mu do těla vpravovat různé chemikálie.
text4 =  SCP-049 po přibližně 20 minutách SCP-049-2 zašije a opět se stane poslušným. Po několika minutách se SCP-049-2 vrací vitální funkce a zdá se, že ožívá.

[SCP-066]
image path = 066.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-066 je amorfní hmota z pletené příze a stužek vážící přibližně jeden kilogram.
text2 = Po Incidentu 066-2 (viz Záznam incidentu 066-2) začalo SCP-066 vykazovat chování vysoce neslučitelné s jeho předchozími vlastnostmi. 
text3 = SCP-066 je nyní výrazně pohyblivější, což se týká hlavně jeho chapadlovitých částí. Kromě toho samovolně vytváří zvuky a účinky v přítomnosti jakékoliv osoby bez ohledu na to, zda tato osoba nějakým způsobem interagovala s SCP-066.

[SCP-079]
image path = 079.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-079 je mikropočítač Exidy Sorcerer postavený v roce 1978.
text2 = Není známo, kdy přesně nabylo SCP-079 vědomí, ale ví se, že software se vyvinul do bodu, kdy by hardware neměl stačit, ani v říši fantazie.
text3 = Prošlo Turingovým testem a rádo konverzuje, i když v drzém a nenávistném tónu. Také několikrát projevilo svou touhu utéct.

[SCP-096]
image path = 096.png
align x = right
align y = bottom
disablebackground = true
text1 = SCP-096 je normálně extrémně poslušné, tlakové senzory uvnitř jeho cely indikují, že většinu dne tráví obcházením východní stěny.
text2 = Avšak, pokud někdo spatří obličej SCP-096, ať už přímo, přes video nahrávku, nebo i fotografii, vstoupí SCP-096 do fáze značné emoční úzkosti.
text3 = Přibližně po jedné (1), až dvou (2) minutách po prvním spatření se SCP-096 rozběhne za osobou, jež viděla jeho obličej.

[SCP-106]
image path = 106.jpg
align x = right
align y = bottom
text1 = SCP-106 je postarší humanoid jež obvykle vypadá jako by procházel pokročilým stádiem rozkladu. Jeho vzhled se může lišit, ale "hniloba" je pozorovatelná ve všech formách.
text2 = SCP-106 způsobuje "korozní" efekt na každém pevném materiálu, jehož se dotkne a započne fyzickou degradaci ve všech materiálech několik sekund po kontaktu. To je pozorovatelné jako rezavění, hniloba a praskání materiálů spolu s tvorbou černé slizovité látky podobné té, jež pokrývá SCP-106.
text3 = SCP-106 je schopno procházet skrz pevné povrchy, přičemž zanechává velké množství korozivního slizu. SCP-106 je schopno "zmizet" do pevné látky, přičemž vstoupí do něčeho, o čemž se předpokládá, že je jakási forma "kapesní dimenze".

[SCP-173]
image path = 173.jpg
align x = left
align y = bottom
text1 = SCP-173 je vyrobené z betonu a železa s trochou Krylonového spreje. Je živé a extrémně nepřátelské.
text2 = Objekt se nemůže pohybovat, když je přímo pozorován. Oční kontakt s SCP-173 nesmí být za žádnou cenu přerušen. Členové personálu, kteří vstupují do kontejnmentu musí jeden druhého upozornit než mrknou.

[SCP-205]
image path = 205.jpg
align x = right
align y = bottom
disablebackground = true
text1 = SCP-205 je pár reflektorů požívaných při fotografování. Světlo vyzařované oběma lampami je pro SCP-205 jedinečné, protože prochází jakýmkoliv povrchem, který nemá bílé zbarvení.
text2 = Pokud světlo z obou lamp neprochází přes materiál, vrhá stín neznámé mladé ženy na jakýkoliv plochý bílý povrch, jako je například promítací plátno v Komoře 52.

[SCP-294]
image path = 294.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-294 vypadá jako standardní automat na kávu, jediný rozdíl je velká QWERTY klávesnice nahrazující výběrové menu.
text2 = Poté, co se do automatu vloží částka padesáti centů americké měny, uživatel je vyzván, aby napsal jméno jakékoliv tekutiny. Po zadání požadavku SCP-294 vydá papírový kelímek objemu 12 uncí a do něj připraví požadovanou kapalinu.
text3 = Proběhlo 97 testovacích požadavků (včetně požadavků na vodu, kafe, pivo, sodu a také nepoživatelné tekutiny jako kyselina sírová, směs do ostřikovačů a motorový olej, také požadavky na látky, které za normálních podmínek nejsou kapalné, např. dusík, železo a sklo) a každý proběhl úspěšně.

[SCP-372]
image path = 372.jpg
align x = left
align y = bottom
disablebackground = true
text1 = SCP-372 je stvoření neznámého původu, přibližně dva metry dlouhé od hlavy k ocasu, vážící 45 kilogramů. Má dlouhé, štíhlé tělo s osmi páry útlých noh.
text2 = SCP-372 se naučilo načasovat své pohyby v okolí jakékoli bytosti. Tuto techniku používá k skrývání, ať už za hlavou osoby, která jej hledá, nebo v jejich slepých bodech a při rychlém pohybu očí.
text3 = V případě prolomení zadržení je veškerý personál žádan aby nahlasíl jakékoli krátké mihotavé pohyby v koutcích očí.

[SCP-427]
image path = 427.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-427 je malý, kulatý, dekorativně vyřezávaný přívěšek vyrobený z lesklého stříbřitého materiálu. Nezdá se, že by dekorovaná řezba sloužila nějaké funkci.
text2 = SCP-427 bylo vytvořeno vložením pilulky SCP-500 do SCP-914 na nastavení "Jemné". Nevykazuje žádnou nezvyklou aktivitu když je zavřené. Když se otevře, uvnitř je vidět malý svítící orb. Orb nevysílá žádnou radiaci, nebo energii kromě viditelného spektra.
text3 = Avšak dlouhodobé vystavení představuje silné zdravotní riziko. Neboť přívěšek léčí poškození a zároveň optimalizuje normální systémy těla. Zaměstnanci Třídy D, kteří byli celkově vystaveni déle, než jednu hodinu začali mutovat do beztvaré hroudy tkáně.
text4 = "Masové Bestie" vytvořené tímto způsobem pomocí SCP-427 jsou neuvěřitelně agresivní a útočí na všechen personál, který uvidí, často se smrtícími následky. Jsou vysoce odolné vůči většině známých zbraní.

[SCP-500]
image path = 500.jpg
align x = right
align y = bottom
text1 = SCP-500 je malá plastová nádoba na léky, která v sobě má ve chvíli psaní čtyřicet sedm (47) červených pilulek.
text2 = Jedna pilulka, když podaná orálně, efektivně vyléčí všechny nemoci subjektu do dvou hodin, přesný čas záleží na vážnosti a rozsahu.
text3 = I přes rozsáhlé zkoušky se všechny pokusy syntetizovat víc aktivní přísady pilulek, setkaly s nezdarem.

[SCP-513]
image path = 513.jpg
align x = center
align y = center
disablebackground = true
text1 = Fyzicky je SCP-513 nezajímavý, rezavý kravský zvon. Na jeho povrchu nejsou kvůli korozi viditelné žádné značky, nebo rytiny.
text2 = Přibližně jednu hodinu po vystavení jakémukoliv hluku produkovanému SCP-513, začali oběti zachytávat letmým pohledem entitu popsanou jako SCP-513-1.
text3 = Všechny výslechy doposud indikovaly, že SCP-513-1 je vysoký, vyzáblý humanoid s abnormálně dlouhými pažemi.

[SCP-682]
image path = 682.jpg
align x = right
align y = bottom
text1 = SCP-682 je velký neurčitý plaz neznámého původu. SCP-682 chová hlubokou nenávist vůči všemu živému, což prokázalo během několika rozhovorů za dobu, jež strávilo v zadržení Nadace.
text2 = SCP-682 má extrémní sílu, rychlost a reflexy, avšak přesné údaje se liší v závislosti na formě. Regenerativní schopnosti SCP-682 jsou ohromující a SCP-682 bylo spatřeno jak se pohybuje a mluví i když 87% jeho těla bylo zničeno, nebo bylo odumřelé.
text3 = SCP-682 musí být zničeno jakmile to bude možné.

[SCP-714]
image path = 714.jpg
align x = center
align y = center
disablebackground = true
text1 = Zdánlivě pouhý zelený jadeitový prsten. SCP-714 se však dokáže přizpůsobit velikostí tak, aby perfektně sedělo na prstu kohokoliv se dotkne, ovšem to je jeho nejméně důležitá vlastnost. 
text2 = Nošení SCP-714 způsobuje několik závažných efektů, jako je vyčerpání, nutkání odpočívat/spát, pomalé reakce, zpomalená pohyblivost a snížená mentální kapacita.
text3 = Nositelé SCP-714 vykazují zvýšenou tolernaci vůči jedovatým či toxickým chemikáliím a abnormálně silnou odolnost vůči memetickým a mentálním vlivům.

[SCP-860]
image path = 860.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-860 je tmavě modrý klíč klasického tvaru.
text2 = V zdánlivě náhodných intervalech se na klíči objeví řada čísel, později zjištěno že jde o UTM souřadnice.
text3 = SCP-860 se dá vložit do jakýchkoliv dveří se zámkem v oblasti určené souřadnicemi a bude fungovat stejně jako správný klíč pro vybrané dveře.
text4 = Když je SCP-860 použito k odemčení dveří, dveře nevedou k obvyklé destinaci. Namísto toho vedou na malou lesní mýtinu soustředěnou na 80 cm široké lesní cestě, označené SCP-860-1.

[SCP-895]
image path = 895.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-895 je zdobená rakev z dubového dřeva, získaná Nadačním personálem dne [VYMAZÁNO], z pohřebního ústavu [VYMAZÁNO].
text2 = SCP-895 způsobuje narušení video a fotografických systémů v okruhu 50 metrů, jež se podobá živým, znepokojivým halucinacím o různé délce trvání a intenzitě, podle blízkosti zařízení k SCP-895.
text3 = V blízkosti 5 metrů od SCP-895, může zachycený obsah způsobit u většiny subjektů psychologické trauma a histérii.

[SCP-914]
image path = 914.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-914 je velké mechanické zařízení vážící několik tun a pokrývající oblast 18 metrů čtverečních, skládá se ze šroubů, pásů, páček, ozubených kol, pružin a dalších mechanismů.
text2 = Když je do vstupní kabiny vložen objekt, dveře se zavřou a zazvoní malý zvonek. Pokud je knoflík otočen do jakékoliv pozice a je otočeno klíčem, SCP-914 "zdokonalí" předmět v kabině. Během procesu nedojde ke ztrátě žádné energie a objekt je zdokonalen v závislosti na nastavení na hlavním panelu SCP-914.
text3 = Biologické testy byly pozastaveny. Jakékoliv biologické testování musí být nejdříve schváleno Radou O5.

[SCP-939]
image path = 939.jpg
align x = left
align y = top
disablebackground = true
text1 = SCP-939 jsou teplokrevní, dravci, vykazující atrofii orgánů, která je charakteristická pro troglobiontické organismy. Jedinci SCP-939 měří průměrně 2,2 metru, a jejich váha se pohybuje kolem 250 kilogramů, i když hmotnost je velmi variabilní.
text2 = Oblíbená metoda SCP-939 jak přilákat oběť, je napodobit lidskou řeč hlasem dříve usmrcených obětí, ačkoli došlo k případům aktivního nočního lovu a napodobování zvuku jiných zvířat.
text3 = Oběť SCP-939 je obvykle usmrcena jediným skusem lebky nebo krku. Jejich čelisti jsou schopny vyvinout tlak převyšující 35 MPa.


[SCP-966]
image path = 966.jpg
align x = left
align y = bottom
disablebackground = true
text1 = SCP-966 jsou viditelná pouze při vlnové délce mezi 700 nm a 900 nm. To platí pro veškerou tkáň SCP-966.
text2 =  Jejich lovící taktika sestává z vydávání dříve neznámého vlnového výboje, jež permanentně znemožní ovlivněné bytosti schopnost NREM a REM spánku. Schopnost mikrospánku je rovněž ztracena.
text3 = Poté co vyčerpá oběť nespavostí, bude SCP-966 následovat svou oběť dokud ji nedostatek spánku neznehybní. Poté SCP-966 svou oběť zkonzumuje.


[SCP-970]
image path = 970.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-970 je prostorový fenomén, který způsobuje, že se množství místností zacyklí samo do sebe. Ve všech zatím objevených případech se fenomén projevil prostřednictvím dvěří, které se objevily ve zdech, vždy ve dvojici v protilehlých stěnách.
text2 =  Změny způsobené fenoménem nemají žádný efekt na sousedící místnosti ani přilehlá podlaží. V tento moment neexistuje vědecké vysvětlení tohoto fenoménu.
text3 = Od objevu fenoménu SCP-970 bylo nalezeno [VYMAZÁNO] dalších případů fenoménu SCP-970, [VYMAZÁNO]% z nich do 800 kilometrů od Oblasti-19.

[SCP-1025]
image path = 1025.jpg
align x = right
align y = bottom
text1 = SCP-1025 je kniha s tvrdými deskami obsahující přibližně 1,500 stránek. Obálka knihy a hřbet nesou nápis "Encyklopedie Běžných Nemocí".
text2 = Nebyly nalezeny žádné další knihy od tohoto vydavatele, ani vydavatelství, nebo záznam o existenci vydavatelství.
text3 = U čtenářů knihy se objeví symptomy nemocí, o kterých si přečtou. Efekt se objeví mezi _ a __ hodinami od přečtení.

[SCP-1123]
image path = 1123.jpg
align x = center
align y = center
disablebackground = true 
text1 = SCP-1123 is a human skull missing the lower mandible and all its teeth. Across the exterior squama frontalis is modern Khmer script, written in human blood, that translates as "Remember".
text2 = Genetic testing confirms that both the skull and the blood are from the same individual. The Khmer script is badly faded, and invisible to most subjects beyond 5 meters distance.
text3 = Subjects at 1 meter or less from the object will report the blood being fresh, as if "still wet", as well as other anomalous sensory phenomena, including smells, sounds, and tactile responses.

[SCP-1162]
image path = 1162.jpg
align x = center
align y = center
disablebackground = true 
text1 = V současné době je SCP-1162 díra ve zdi ze škvárobetonových tvárnic v Oblasti-[DATA VYMAZÁNA].
text2 = SCP-1162 se aktivuje, když vnímající bytost sáhne do otvorů. V tom okamžiku se její prsty dotknou pevného povrchu pocitem podobným, jako je u SCP-1162 v jeho současné lokaci. Poté bytost objeví předmět dostatečně malý na to, aby se protáhl otvorem.
text3 = Tyto předměty byly celkově popsány jako něco, co uživatel ztratil nebo co v určitém okamžiku svého života hledal.

[SCP-1499]
image path = 1499.jpg
align x = right
align y = bottom
disablebackground = true 
text1 = SCP-1499 je Sovětská plynová maska GP-5. Test těsnění provedený na objektu naznačuje, že si objekt zachovává svou původní funkčnost.
text2 = Anomální účinky SCP-1499 se aktivují, když si člověk nasadí SCP-1499 na hlavu. Přibližně jednu sekundu poté, co je SCP-1499 plně zajištěna na hlavě subjektu, subjekt zmizí z pohledu a stane se nedetekovatelným.
text3 = Při nošení SCP-1499 subjekty popisují zcela odlišné prostředí, než ve kterém byly před nošením SCP-1499.

[Povstání Chaosu]
image path = chaos.jpg
align x = left
align y = bottom
disablebackground = true
text1 = Roku 1924 vytvořila Nadace SCP speciální tajnou údernou jednotku známou pouze Radě O5 s krycím jménem "Povstání". Vedení Povstání bylo sestaveno ze členů MTF Alfa-1 ("Red Right Hand"), známé svou loajalitou Radě O5 a totálním utajením jejich původu, identit a operací.
text2 = V roce 1948 "Povstání" zajistilo několik SCP objektů a s nimi i dezertovalo z Nadace. Ze zeběhlé bývalé MTF se stala organizace říkající si: Povstání Chaosu.
text3 = Její hlavní operační základna je neznámá stejně jako její vůdci. Tato organizace je přímo v opozici vůči Nadaci a několikrát se kvůli SCP dostala do otevřeného střetu. 
text4 = Personál je povinen být informován o možných raziích, teroristických pokusech a špionech z řad Povstaní a informovat velení o jakémkoli podivném chování kolegů.

