text1 = SCP Nadace je organizace věnující se zadržování a výzkumu anomálních předmětů a forem života.
text2 = "My zajišťujeme. My zadržujeme. My chráníme." - Administrátor
text3 = "SCP" je zkratka pro "Speciální Zadržovací Procedury" (a oficiální motto Nadace, "Zajistit, Zadržet, Chránit.") - což shrnuje jak cíle, tak metody akcí Nadace.
