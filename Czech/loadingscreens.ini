text1 = Personál třídy D jsou zaměstnanci určeni k manipulaci s objekty třídy Keter.
text2 = Personál třídy D se skládá z bývalých vězňů. Přednost mají osoby odsouzené k trestu smrti; v nouzi lze autorizovat Protokol 12, který umožňuje nábor nevinných nebo osob uvězněných za méně závažné trestné činy.
text3 = Veškerý personál třídy D je po uplynutí jednoho měsíce propuštěn, a noví zaměstnanci musí být připraveni je nahradit.

