;color = El color del líquido
;alpha = la transparencia del líquido (0.0 = invisible, 1.0 = opaco)
;glow = true/false, hace que el líquido brille

;sound = El clip de sonido se reproduce cuando el jugador bebe el líquido.
;dispensesound = El clip de sonido que se reproduce cuando se dispensa el líquido ("SFX\SCP\294\dispense1.ogg" por defecto)

;message = Texto que aparece en la pantalla después de beber el líquido.
;refusemessage = Texto que se muestra en la pantalla después de negarse a beber el líquido (debe existir para que el jugador se niegue a beberlo).

;lethal = true/false, mata al jugador inmediatamente después de beber el líquido
;deathtimer = (if not lethal) cuántos segundos antes de matar al jugador después de beber el líquido
;explosion = true/false, crea una explosión similar a la de la Puerta B cuando se dispensa el líquido.
;deathmessage = el texto que se muestra en la pantalla de fin de partida si el líquido mata al jugador

;blur = cuántos segundos permanece borrosa la pantalla después de beber el líquido
;vomit = cuántos segundos el jugador se siente enfermo después de beber el líquido, antes de vomitar
;camerashake = cuántos segundos tiembla la cámara después de beber el líquido
;damage/injuries = aumenta el valor de las lesiones
;blood loss = aumenta el valor de pérdida de sangre
;stomachache = true/false, tiene el mismo efecto que la apendicitis causada por SCP-1025 (disminución de la resistencia y mensajes sobre dolor de estómago).

;stamina effect = cambia la velocidad a la que disminuye la resistencia (1.0 = velocidad normal, 2.0 = disminuye el doble de rápido, 0.0 = no disminuye en absoluto)
;stamina effect timer = cuántos segundos antes de que desaparezca el efecto de resistencia
;blink effect, blink effect timer

