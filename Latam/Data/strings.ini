bluefirstaid.use.heal = Vendaste las heridas. El sangrado se detiene y ahora estás bien.
bluefirstaid.use.hurt = Vendaste las heridas y la sangre empieza a salir copiosamente a través de los vendajes.
veryfinefirstaid.use.fullheal = Tus heridas empiezan a sanar rápido.
veryfinefirstaid.use.hurt = Empiezas a sangrar mucho.
veryfinefirstaid.use.heal = Te sientes mucho mejor.
veryfinefirstaid.use.nausea = Te sientes con náuseas.
veryfinefirstaid.use.pocketdimension = Por alguna razón, terminaste en la dimensión de bolsillo.
eyedrops.tear = Las gotas para los ojos provocan que te salgan lágrimas.
syringe.use = Te inyectaste la jeringa y sientes una ligera descarga de adrenalina.
finesyringe.use = Te inyectas la jeringa y sientes una descarga de adrenalina.
veryfinesyringe.use.huge = Te inyectas la jeringa y sientes una enorme descarga de adrenalina.
veryfinesyringe.use.veryhuge = Te inyectas la jeringa y sientes una descarga de adrenalina muy grande.
veryfinesyringe.use.stomacheache = Te inyectas la jeringa y sientes dolor de estómago.
pill.use = Te tragaste la píldora.
pill.use.healnausea = Te tragaste una píldora. Tus náuseas están desapareciendo.
cigarette.use.unable = No puedes encenderlo.
cigarette.use_1 = "No tengo nada para encenderlo... umm, ¿y si uso eso...? Oh, olvídalo."
cigarette.use_2 = "Ya dejé eso hace mucho tiempo."
cigarette.use_3 = "Aunque quisiera uno, no debo encenderlo."
cigarette.use_4 = "Me gustaria fumarme uno ahora mismo... Quisiera tener un encendedor."
cigarette.use_5 = "No planees iniciar, incluso en un momento como este."
420j.use.714 = "¡Amigo, qué? ¡Esta cosa ni siquiera funciona!"
420j.use = "Hombre, esto es una excelente mierda."
420j.use.nap = "Eh?... ¿Pero qué demonios estaba haciendo? Hombre, debo tomar una siesta..."
427.on = Abriste el medallón.
427.off = Cerraste el medallón.
1162.use.badge = "¿Eh? ¡Este tipo se parece a mí!"
1162.use.key = "¿No es esta la llave de la vieja choza? La que yo... No, no puede ser."
1162.use.hearing = "¿Por qué esto me resulta familiar?"
1162.use.ticket = "Hey, ¡recuerdo esta película!"

