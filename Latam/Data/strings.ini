[Option Tooltip]
; Graphics
vsync = La sincronización vertical espera a que la pantalla termine de calcular su ciclo de actualización antes de poder trabajar en el siguiente fotograma, evitando el *screen tearing*. Esto sincroniza la tasa de fotogramas con la frecuencia de actualización de tu pantalla (puede causar cierto retraso en la entrada).
antialiasing = "El anti-aliasing se usa para suavizar los modelos y evitar los bordes dentados."
gamma = "Gamma correction" se utiliza para lograr un buen brillo que equilibre la gamma de tu pantalla en caso de que el juego se vea demasiado brillante u oscuro. Si lo ajustas mal, los gráficos pueden perder detalle.
texlod = "Texture LOD Bias" afecta a qué distancia cargan las texturas para evitar bordes raros o parpadeos. Úsala si ves que las texturas parpadean o se ven borrosas.
vram = Las texturas almacenadas en la VRAM cargarán más rápido, pero también afectarán negativamente a la calidad de las texturas.
hudoffset = "HUD offset" se utiliza para mover las barras de resistencia y parpadeo, así como el HUD de varios objetos hacia el centro de la pantalla. Es ideal sobre todo para monitores ultrawide.
fov = "Field of View" (FOV) indica cuánto del juego se muestra en pantalla.

; Audio
musicvol = Controla el volumen de la música del juego. Deslizar la barra completamente a la izquierda silenciará la música.
soundvol = Controla el volumen de los efectos de sonido del juego. Deslizar la barra completamente a la izquierda silenciará los efectos de sonido.
sfxautorelease = "Sound auto-release" eliminará un sonido del juego si no se usa durante 5 segundos, evitando que se acumulen errores de memoria.
usertrack = Activa o desactiva la capacidad de elegir la pista de audio que quieras en el canal 1 de la radio. Estas pistas están ubicadas en el directorio 'SFX\\Radio\\UserTracks\\'. Pulsa la tecla 1 con la radio seleccionada para cambiar la pista.
usertrackmode = Configura el modo de reproducción para tus pistas. Con 'Repeat' reproduce cada pista en orden alfabético; con 'Random' reproduce las pistas aleatoriamente.
usertrackmode.note = Configurar las pistas en 'Random' puede hacer que algunas se repitan.
usertrackscan = Revisa el directorio de pistas para comprobar si agregaste o eliminaste alguna.

; Controls
mousesensitivty = Ajusta el nivel de velocidad del mouse.
mousesmoothing = Ajusta el suavizado del puntero del mouse.
binds = Configura el esquema de controles del juego.

; Advanced
showhud = Muestra el nivel de parpadeo y stamina.
console = Activa la consola de desarrollador, puede usarse presionando {0}.
console.note = Usar la consola desactiva los logros de Steam.
speedrunmode = Muestra un temporizador y cambia la manera en que se registra el tiempo del juego para cumplir los objetivos de la speedrun.
numericseeds = Permite introducir en el generador de semillas números enteros, usadas para generar directamente el generador de números aleatorios. Tenga en cuenta que si no introduce nada se utilizarán los milisegundos usados desde el inicio del ordenador.
achpopup = Muestra una notificación de cuando desbloqueas un logro.
launcher = Habilita el launcher si este ha sido deshabilitado.
showfps = Muestra los fps en la esquina superior izquierda.
framelimit = Limita los fps que puede ejecutar el juego en un valor deseado.
framelimit.note = Usualmente se prefiere 60 fps o mas. Pero si nota un tartamudeo excesivo bajelo para fps mas estables

