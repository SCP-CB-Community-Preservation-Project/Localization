[Death Message]
008 = El sujeto D-9341 fue hallado ingiriendo al Dr. [REDACTADO] en el sector [REDACTADO] el sujeto fue neutralizado por los Nine-Tailed Fox y enviado a una autopsia. Se confirmó la infección del SCP-008, tras lo cual el cuerpo fue quemado.
008.gate =  El sujeto D-9341 fue hallado deambulando {0}. El sujeto fue neutralizado por los Nine-Tailed Fox y enviado a una autopsia. Se confirmó la infección del SCP-008, tras lo cual el cuerpo fue quemado.
008.gate.a = Gate A
008.gate.b = Gate B
008zombie = Sujeto D-9341. Causa de muerte: múltiples laceraciones y traumatismo craneal contundente causado por [Datos Eliminados], fue infectado por 008. Se dice que el sujeto fue localizado por los Nine-Tailed Fox y eliminado
012 = El Sujeto D-9341 fue encontrado en un charco de sangre con SCP-012. Aparentemente el sujeto se rasgó las muñecas y escribió tres líneas adicionales en la composición antes de morir desangrado.
035.chamber = El Clase D Sujeto D-9341 fue encontrado adentro de la cámara de contención del SCP-035. El sujeto presenta graves hemorragias en los vasos sanguíneos alrededor de los ojos y dentro de la boca y la nariz. Se lo envió para una autopsia.
035.tentacle = "Vamos a necesitar más que el equipo de limpieza regular para encargarnos de esto. Dos apéndices muy grandes parecidos a tentáculos han sido vistos en la cámara de contención. Su nivel de agresividad es incomparable y también parece que golpearon hasta la muerte a un Clase D hasta la muerte."
035.tentacle.office = "Un apéndice grande y muy activo, parecido a un tentáculo, parece haber crecido en el cadáver de un científico en el área de oficinas [REDACTADO]. Su nivel de agresividad es incomparable y también parece que golpearon hasta la muerte a un Clase D hasta la muerte."
049 = Se descubrió una instancia activa de SCP-049-2 en [REDACTADO]. Fue eliminada por los Nine-Tailed Fox.
049.chamber = Se descubrieron tres (3) instancias activas de SCP-049-2 en el túnel, afuera de la cámara de contención de SCP-049. Eliminados por los Nine-Tailed Fox.
0492 = Sujeto D-9341. Causa de muerte: múltiples laceraciones y traumatismo craneal contundente causado por una instancia de SCP-049-2.
096 = Se encontró mucha sangre en [DATA REDACTED]. El ADN identificó a D-9341. Lo más probable [Datos Eliminados] por SCP-096.
106.pd = Sujeto D-9341. El cuerpo se encuentra parcialmente descompuesto por lo que se cree es el efecto de "corrosión" de SCP-106. El cuerpo fue incinerado.
106.pd.crushed = Además del aspecto descompuesto típico de las víctimas de SCP-106, el cuerpo presenta lesiones que no se habían observado antes: una fractura masiva de cráneo, tres costillas rotas, una fractura de hombro y múltiples laceraciones profundas.
106.pd.fall = Además del aspecto descompuesto típico de las víctimas de SCP-106, el sujeto parece haber sufrido múltiples fracturas graves en ambas piernas.
173 = Sujeto D-9341. Causa de muerte: Fractura cervical fatal. Se cree que fue atacado por SCP-173.
173.camera = Sujeto D-9341. Causa de muerte: Fractura cervical fatal. Las cintas de vigilancia confirman que el sujeto fue asesinado por SCP-173.
173.intro = Sujeto D-9341. Causa de muerte: Fractura cervical fatal. Según el jefe de seguridad Franklin, quien estuvo presente en la cámara de contención de SCP-173 durante la brecha, el sujeto fue asesinado por SCP-173 tan pronto como comenzaron las interrupciones en la red eléctrica.
173.doors ="Si no me equivoco, uno de los principales propósitos de estas habitaciones era impedir que SCP-173 avanzara en caso de una brecha de contención. Entonces, ¿a quién se le ocurrió la brillante idea de poner ahí UN MALDITO CONDUCTO DE VENTILACIÓN DEL TAMAÑO DE UN HOMBRE?"
205 = El ciclo SCP-205 parece haber retomado su curso normal tras las anomalías observadas durante [REDACTADO]. El cuerpo del sujeto D-9341 fue hallado dentro de la cámara. El sujeto presenta signos de traumatismo por impacto, típicos del personal que ha entrado en la cámara con las luces apagadas.
420js = El sujeto D-9341 fue hallado en estado de coma en [DATOS ELIMINADOS]. Sostenía lo que parecía ser un cigarrillo mientras sonreía ampliamente. El análisis químico del cigarrillo no fue concluyente, aunque parece contener una alta concentración de una sustancia química no identificada cuya estructura molecular es notablemente similar a la del tetrahidrocannabinol.
427 = "Solicitamos apoyo del MTF Nu-7. Necesitamos más potencia de fuego para acabar con esto."
895 = "Lo que sabemos es que murió de un paro cardíaco. Sospecho que fue causado por SCP-895, aunque nunca antes se había observado que afectara a equipos de vídeo desde tan lejos. Se necesitan más pruebas para determinar si la 'Zona Roja' de SCP-895 se está expandiendo."
895.nvg = "El Clase D observó a SCP-895 a través de unas gafas digitales de visión nocturna lo cual provocó su muerte."
895.finenvg = "El Clase D observó a SCP-895 a través de unas gafas digitales de visión nocturna, presumiblemente mejoradas por SCP-914. Es posible que el sujeto haya podido resistir parcialmente los efectos meméticos gracias a estas gafas. Las gafas se han almacenado para su posterior estudio."
914.rough = "Se encontró un cadáver gravemente mutilado dentro de la cabina de salida de SCP-914. Las pruebas de ADN identificaron el cadáver como el Sujeto D-9341 de Clase D. Obviamente, el sujeto había sido 'refinado' por SCP-914 en la configuración 'Bruto', pero aún no sabemos cómo terminó dentro de la cabina de entrada ni quién o qué accionó la llave."
914.superman = Un uniforme de Clase D se halló en [DATOS ELIMINADOS]. Tras un examen más detallado, se descubrió que el traje estaba relleno con 12,5 kilogramos de una sustancia azul similar a la ceniza. El análisis químico de la sustancia no ha sido concluyente. Probablemente esté relacionada con SCP-914.
939 = "Los cuatro (4) especímenes de SCP-939 que escaparon han sido capturados y recontenidos con éxito. Tres (3) de ellos causaron un gran desastre en el Área de Almacenamiento 6. Se ha enviado un equipo de limpieza."
1025.cardiacarrest = "He died of a cardiac arrest after reading SCP-1025, that's for sure. Is there such a thing as psychosomatic cardiac arrest, or does SCP-1025 have some anomalous properties we are not yet aware of?"
1123 = El sujeto D-9341 fue abatido a tiros tras intentar atacar a un miembro de los Nine-Tailed Fox. Las cintas de vigilancia muestran que el sujeto había estado deambulando por el lugar aproximadamente 9 minutos antes, gritando la frase "elimina estas 4 pestes" en chino. SCP-1123 fue hallado en [REDACTADO] cerca de allí, lo que sugiere que el sujeto tuvo contacto físico con él. Aún se desconoce cómo se extrajo exactamente SCP-1123 de su cámara de contención.
1048a = Se encontró un cadáver cubierto de orejas en [REDACTADO]. Se presume que el sujeto fue atacado por una instancia de SCP-1048-A y murió asfixiado por las orejas. El cuerpo fue enviado para autopsia.
1162 = Se descubrió un sujeto de Clase D muerto dentro de la cámara de contención de SCP-1162. Una autopsia reveló que le faltaba el pulmón derecho, lo que sugiere una interacción con SCP-1162.
1499 = Aún se desconoce el paradero de SCP-1499, pero se ha enviado un equipo de reconocimiento para investigar los informes de un ataque violento a una iglesia en la ciudad rusa de [REDACTADO].
14991 = Un hombre no identificado y un sujeto de Clase D fallecido fueron encontrados en [REDACTADO] por un Nine-Tailed Fox. El hombre fue descrito como muy agitado y parecía hablar solo ruso. Ha sido trasladado a un área de detención temporal en [REDACTADO] a la espera de la llegada de un traductor.
14991.dimension = A todo el personal que se encontraba dentro del Refugio de Evacuación LC-2 durante la brecha se le administraron amnésicos de Clase B debido al Incidente 1499-E. El sujeto de Clase D involucrado en el evento murió poco después de ser disparado por el Agente [REDACTADO].
guard.intro = Sujeto D-9341. Causa de muerte: Herida de bala en la cabeza. Las grabaciones de vigilancia confirman que el agente Ulgrin eliminó al sujeto poco después de que se activara el cierre de las instalaciones.
guard.gate.b = "Agente G. Al control. Eliminó a un Clase D fugitivo en el patio de la Puerta B."
apache = "CH-2. Al control. Derribó un Clase D fuera de control en {0}."
apache.gate.a = Puerta A
apache.gate.b = Puerta B
ntf = Sujeto D-9341. Eliminado por los Nine-Tailed Fox.
ntf.bloodloss = Sujeto D-9341. Murió por pérdida de sangre después de recibir un disparo de los Nine-Tailed Fox.
tesla = Sujeto D-9341 asesinado por la puerta tesla en [REDACTADO].
killbat = El sujeto D-9341 fue hallado muerto dentro de la cabina de salida de SCP-914, junto a lo que parece ser una batería común de nueve voltios. El sujeto presentaba quemaduras eléctricas graves y se presume que murió por una descarga eléctrica provocada por la batería. La batería ha sido almacenada para su posterior estudio.
suicide_1 = [REDACTADO]
suicide_2 = El sujeto D-9341 fue hallado muerto en el Sector [REDACTADO]. Aparentemente no presentaba lesiones físicas y no hay indicios visibles de la causa de su muerte. El cuerpo fue enviado para la autopsia.
suicide_3 = EXCP_ACCESS_VIOLATION
suicide_4 = Subject D-9341 found dead in Sector [REDACTADO]. The subject appears to have scribbled the letters "kys" in his own blood beside him. No other signs of physical trauma or struggle can be observed. Body was sent for autopsy.
gassed = El sujeto D-9341 fue hallado muerto en [DATOS ELIMINADOS]. Causa de muerte: Asfixia por gas de descontaminación.

