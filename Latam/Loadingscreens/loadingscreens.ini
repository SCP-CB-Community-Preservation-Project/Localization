[Mobile Task Forces]
image path = mtf.jpg
align x = center
align y = center
text1 = Los MTF son equipos pequeños (de diez a veinte agentes por lo general, aunque no son raros los grupos de más de 50 agentes) que se especializan en funciones específicas o responden a situaciones concretas.
text2 = El Grupo Operativo Móvil E-11 (''Zorro de Nueve Colas'') es un Grupo Operativo intensamente entrenado que se especializa en la protección y la recontención de los artículos SCP que se conservan en el Sitio-[DATOS ELIMINADOS].
text3 = Sus tareas incluyen la gestión de las brechas de contención volviendo a contener todas las instancias SCP activas y hostiles, rescatando al personal de la Fundación que sobrevive y acabando con cualquier personal de la Clase D que se haya rebelado.

[Night Vision Goggles]
image path = NVG.jpg
align x = right
align y = top
disablebackground = true
text1 = Las gafas de visión nocturna estándar se entregan a los MTF en caso de apagón eléctrico.
text2 = Los científicos también disponen de ellos, pero se les aconseja que se centren en la evacuación en caso de apagón.

[SCP-012]
image path = 012.jpg
align x = right
align y = top
disablebackground = true
text1 = SCP-012 fue recuperado por el arqueólogo K.M. Sandoval durante la excavación de una tumba del norte de Italia. El objeto, una partitura musical manuscrita titulada ''En el monte Gólgota'', parece estar incompleto.
text2 = La tinta roja/negra, que en un principio se pensó que era alguna forma de tinta de bayas o de tinte natural, se descubrió después que era sangre humana de múltiples sujetos.
text3 = Múltiples sujetos de prueba han tenido acceso a la partitura. En todos los casos, los sujetos se mutilaron a sí mismos con el fin de utilizar su propia sangre para terminar la pieza, lo que provocó síntomas posteriores de psicosis y traumas masivos.

[SCP-035]
image path = 035.jpg
align x = right
align y = top
disablebackground = true
text1 = SCP-035 parece ser una máscara de comedia de porcelana blanca, aunque, a veces, cambiará a tragedia.
text2 = Cuando el SCP-035 se coloca en la cara de un individuo, un patrón de ondas cerebrales alternativo del SCP-035 se superpone al del huésped original, extinguiéndolo y causando la muerte cerebral del sujeto. El sujeto afirma entonces ser la conciencia contenida en SCP-035.
text3 = El análisis psicológico ha descubierto que SCP-035 posee una naturaleza altamente manipuladora, capaz de forzar cambios repentinos y profundos en el estado psicológico del entrevistador. SCP-035 ha demostrado ser altamente sádico, incitando a algunos a suicidarse solo con la persuasión lingüística.

[SCP-049]
image path = 049.jpg
align x = left
align y = center
disablebackground = true
text1 = SCP-049 tiene una apariencia humanoide; sin embargo, la Fundación es incapaz de estudiar su rostro y su cuerpo con más detalle, ya que está cubierto con lo que parece ser el atuendo del tradicional médico de la peste de la Europa del siglo XV-XVI.
text2 = El toque de SCP-049 es invariablemente letal para los humanos. Tras el contacto con la(s) mano(s) de SCP-049, la víctima (en lo sucesivo denominada SCP-049-2) sufre [DATOS EXPLÍCITOS] y muere en unos instantes.
text3 = SCP-049 saca entonces una bolsa de [DATOS EXPLÍCITOS] que contiene bisturíes, una aguja, un hilo y varios frascos de una sustancia aún no identificada y comienza a disecar a SCP-049-2, así como a introducir varios productos químicos en el cuerpo.
text4 = Después de aproximadamente 20 minutos, SCP-049 coserá a SCP-049-2 y volverá a ser dócil. Tras unos minutos, SCP-049-2 volverá a tener signos vitales y parece reanimarse.

