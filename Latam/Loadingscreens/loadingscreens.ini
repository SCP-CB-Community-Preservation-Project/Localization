[Mobile Task Forces]
image path = mtf.jpg
align x = center
align y = center
text1 = Los MTF son equipos pequeños (de diez a veinte agentes por lo general, aunque no son raros los grupos de más de 50 agentes) que se especializan en funciones específicas o responden a situaciones concretas.
text2 = El Grupo Operativo Móvil E-11 (''Zorro de Nueve Colas'') es un Grupo Operativo intensamente entrenado que se especializa en la protección y la recontención de los artículos SCP que se conservan en el Sitio-[DATOS ELIMINADOS].
text3 = Sus tareas incluyen la gestión de las brechas de contención volviendo a contener todas las instancias SCP activas y hostiles, rescatando al personal de la Fundación que sobrevive y acabando con cualquier personal de la Clase D que se haya rebelado.

[Night Vision Goggles]
image path = NVG.jpg
align x = right
align y = top
disablebackground = true
text1 = Las gafas de visión nocturna estándar se entregan a los MTF en caso de un apagón eléctrico.
text2 = Los científicos también disponen de ellos, pero se les aconseja que se centren en la evacuación en caso de un apagón.

[SCP-012]
image path = 012.jpg
align x = right
align y = top
disablebackground = true
text1 = SCP-012 fue recuperado por el arqueólogo K.M. Sandoval durante la excavación de una tumba del norte de Italia. El objeto, una partitura musical manuscrita titulada ''En el monte Gólgota'', parece estar incompleto.
text2 = La tinta roja/negra, que en un principio se pensó que era alguna forma de tinta de bayas o de tinte natural, se descubrió después que era sangre humana de múltiples sujetos.
text3 = Múltiples sujetos de prueba han tenido acceso a la partitura. En todos los casos, los sujetos se mutilaron a sí mismos con el fin de utilizar su propia sangre para terminar la pieza, lo que provoco síntomas posteriores de psicosis y traumas masivos.

[SCP-035]
image path = 035.jpg
align x = right
align y = top
disablebackground = true
text1 = SCP-035 parece ser una máscara de comedia de porcelana blanca, aunque, a veces, cambiara a tragedia.
text2 = Cuando el SCP-035 se coloca en la cara de un individuo, un patrón de ondas cerebrales alternativo del SCP-035 se superpone al del huésped original, extinguiéndolo y causando la muerte cerebral del sujeto. El sujeto afirma entonces ser la conciencia contenida en SCP-035.
text3 = El análisis psicológico ha descubierto que SCP-035 posee una naturaleza altamente manipuladora, capaz de forzar cambios repentinos y profundos en el estado psicológico del entrevistador. SCP-035 ha demostrado ser altamente sádico, incitando a algunos a suicidarse solo con la persuasión lingüística.

[SCP-049]
image path = 049.jpg
align x = left
align y = center
disablebackground = true
text1 = SCP-049 tiene una apariencia humanoide; sin embargo, la Fundación es incapaz de estudiar su rostro y su cuerpo con más detalle, ya que está cubierto con lo que parece ser el atuendo del tradicional médico de la peste de la Europa del siglo XV-XVI.
text2 = El toque de SCP-049 es invariablemente letal para los humanos. Tras el contacto con la(s) mano(s) de SCP-049, la victima (en lo sucesivo denominada SCP-049-2) sufre [DATOS EXPLÍCITOS] y muere en unos instantes.
text3 = SCP-049 saca entonces una bolsa de [DATOS EXPLÍCITOS] que contiene bisturíes, una aguja, un hilo y varios frascos de una sustancia aun no identificada y comienza a disecar a SCP-049-2, así como a introducir varios productos químicos en el cuerpo. 
text4 = Después de aproximadamente 20 minutos, SCP-049 cosera a SCP-049-2 y volverá a ser dócil. Tras unos minutos, SCP-049-2 volverá a tener signos vitales y parece reanimarse.

[SCP-066]
image path = 066.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-066 es una masa amorfa de hilo intrincadamente trenzado que pesa aproximadamente un kilo.
text2 = Después del Incidente 066-2 (ver Informe de Incidentes 066-2), SCP-066 comenzó a mostrar un comportamiento altamente inconsistente con sus propiedades anteriores. 
text3 = SCP-066 muestra ahora una movilidad significativa, y producirá notas y efectos anómalos en presencia de cualquier humano, independientemente de que ese humano interactúe con SCP-066.

[SCP-079]
image path = 079.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-079 es un microordenador Exidy Sorcerer construido en 1978. 
text2 = No se sabe cuándo SCP-079 adquirió sensibilidad, pero se sabe que el software ha evolucionado hasta un punto en el que su hardware no debería ser capaz de manejarlo, ni siquiera en el ámbito de la ficción.
text3 = Ha pasado la prueba de Turing y es bastante conversador, aunque con un tono muy grosero y odioso. También muestra un malévolo deseo de escapar.

[SCP-096]
image path = 096.png
align x = right
align y = bottom
disablebackground = true
text1 = SCP-096 es normalmente muy dócil, con sensores de presión dentro de su celda que indican que pasa la mayor parte del día paseando por la pared oriental.
text2 = Sin embargo, cuando alguien vea la cara de SCP-096, ya sea directamente, a través de una grabación de video o incluso de una fotografía, entrara en una etapa de considerable angustia emocional.
text3 = Aproximadamente uno o dos minutos después de la primera visualización, SCP-096 comenzara a correr hacia la persona que vio su cara.

[SCP-106]
image path = 106.jpg
align x = right
align y = bottom
text1 = SCP-106 parece ser un humanoide anciano, con una apariencia general de descomposición avanzada. Esta apariencia puede variar, pero la cualidad de ''putrefacción'' se observa en todas las formas.
text2 = SCP-106 provoca un efecto de "corrosión" en toda la materia solida que toca, provocando una ruptura física en los materiales varios segundos después del contacto. Esto se observa como la oxidación, la putrefacción y el agrietamiento de los materiales, y la creación de una sustancia negra similar al material que recubre a SCP-106.
text3 = SCP-106 puede atravesar la materia sólida y capturara y matara a su presa arrastrándola a lo que se supone que es su ''dimensión de bolsillo'' personal.

[SCP-173]
image path = 173.jpg
align x = left
align y = bottom
text1 = SCP-173 está construido con hormigón y barras de refuerzo con restos de pintura en spray de la marca Krylon. Es animado y extremadamente hostil.
text2 = El objeto no puede moverse mientras este dentro de una línea de visión directa. La línea de visión no debe romperse en ningún momento con el SCP-173. El personal asignado a entrar en el contenedor tiene instrucciones de alertarse mutuamente antes de parpadear.

[SCP-205]
image path = 205.jpg
align x = right
align y = bottom
disablebackground = true
text1 = SCP-205 es un par de reflectores utilizadas en fotografía. La luz emitida por cada lampara se comporta de una manera única para SCP-205 y pasa completamente a través de cualquier superficie que no sea de color blanco.
text2 = Si la luz continua sin interrupción a través de cualquier materia, sin proyectar ninguna sombra, cada lampara mostrara la sombra de una joven no identificada sobre cualquier superficie blanca plana, como la pantalla de proyección de la cámara 52.

[SCP-294]
image path = 294.jpg
align x = center
align y = bottom
disablebackground = true
text1 = El articulo SCP-294 parece ser una máquina expendedora de café estándar, cuya única diferencia notable es un panel táctil con botones correspondientes a un teclado QWERTY inglés.
text2 = Al introducir el nombre de cualquier liquido mediante el panel táctil, se coloca un vaso de papel estándar de 350 ml y se vierte el líquido indicado.
text3 = Se realizaron 97 pruebas iniciales (que incluían solicitudes de agua, café, cerveza y refrescos, líquidos no consumibles como el ácido sulfúrico, el líquido para limpiaparabrisas y el aceite de motor, así como sustancias que no suelen existir en estado líquido, como el nitrógeno, el hierro y el vidrio) y todas ellas resultaron satisfactorias.

[SCP-372]
image path = 372.jpg
align x = left
align y = bottom
disablebackground = true
text1 = SCP-372 es una criatura de genero desconocido, que mide aproximadamente 1,80 metros de largo desde la cabeza hasta la cola y pesa aproximadamente 45 kilogramos. Tiene un cuerpo largo y delgado con ocho pares de extremidades estrechas.
text2 = SCP-372 ha aprendido a predecir los movimientos de cualquier ser a su alrededor, y utiliza esta técnica para esconderse detrás de la cabeza de una persona que lo busca, o en cualquiera de sus puntos ciegos.
text3 = En caso de ruptura de la contención, se aconseja a todo el personal que informe de cualquier movimiento breve de parpadeo en el extremo de su vista.

[SCP-427]
image path = 427.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-427 es un medallón esférico, ornamentalmente tallado, hecho de un material de plata pulida. Las tallas ornamentales no parecen cumplir ninguna función.
text2 = SCP-427 se creó tras colocar una pastilla de SCP-500 en la cabina de entrada de SCP-914 y utilizar la configuración fina. No muestra ninguna actividad inusual cuando está cerrado. Cuando SCP-427 se abre y se expone al tejido biológico, regenera rápidamente les daños celulares y, de alguna manera, es capaz de purgar los compuestos invasores o las infecciones.
text3 = Sin embargo, la exposición a largo plazo produce un importante peligro para la salud. A medida que el relicario cura los danos, optimiza los sistemas naturales del cuerpo. El personal de clase D expuesto al dispositivo durante más de una hora en total comenzó a mutar en una masa amorfa de tejido.
text4 = Las "bestias de carne" creadas por SCP-427 son increíblemente agresivas y atacan a todo el personal que ven con resultados letales. Son muy resistentes a la mayoría de las armas conocidas.

[SCP-500]
image path = 500.jpg
align x = right
align y = bottom
text1 = SCP-500 es una pequeña lata de plástico que, en el momento de escribir este artículo, contiene cuarenta y siete (47) pastillas rojas.
text2 = Una píldora, tomada por vía oral, cura eficazmente al sujeto de todas las enfermedades en dos horas, tiempo exacto depende de la gravedad y la cantidad de las afecciones del sujeto.
text3 = A pesar de los extensos ensayos, todos los intentos de sintetizar más de lo que se cree que es el ingrediente activo de las píldoras han sido infructuosos.

[SCP-513]
image path = 513.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-513 es un cencerro oxidado y poco llamativo. No se aprecian marcas ni grabados en su superficie debido a la gran cantidad de corrosión.
text2 = Aproximadamente una hora después de la exposición a cualquier ruido producido por SCP-513, las víctimas de la exposición comienzan a vislumbrar una entidad designada como SCP-513-1.
text3 = Todos los interrogatorios realizados hasta ahora indican que SCP-513-1 es un humanoide alto y demacrado con manos anormalmente grandes.

[SCP-682]
image path = 682.jpg
align x = right
align y = bottom
text1 = SCP-682 es una criatura grande, vagamente parecida a un reptil, de origen desconocido. Parece tener un odio a toda la vida, que ha expresado en varias entrevistas durante la contención.
text2 = Siempre se ha observado que SCP-682 tiene una fuerza, velocidad y reflejos extremadamente altos, aunque los niveles exactos varían según su forma. La capacidad de regeneración y resistencia de SCP-682 es asombrosa, y se le ha visto moverse y hablar con su cuerpo destruido o podrido en un 87%.
text3 = El SCP-682 debe ser destruido lo antes posible.

[SCP-714]
image path = 714.jpg
align x = center
align y = center
disablebackground = true
text1 = Aparentemente nada más que un anillo de jade verde, SCP-714 ha demostrado ser capaz de expandirse y contraerse para adaptarse perfectamente al dedo de cualquiera que lo toque, aunque esta es la menos importante de sus propiedades. 
text2 = Llevar el SCP-714 tiene varios efectos importantes, como el agotamiento, la compulsión al descanso/sueno, la lentitud de reacciones y la reducción de la capacidad mental.
text3 = Los portadores de SCP-714 muestran una mayor tolerancia a diversas sustancias químicas y una resistencia anormalmente alta a las influencias meméticas y mentales.

[SCP-860]
image path = 860.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-860 es una llave azul oscura de forma poco llamativa.
text2 = A intervalos de tiempo aparentemente aleatorios, aparecen una serie de números en la hoja de la llave. Mas tarde se descubrió que eran coordenadas UTM.
text3 = SCP-860 puede adaptarse y desbloquear cualquier cerradura de puerta tradicional que requiera una llave situada en la zona de las coordenadas dadas.
text4 = Cuando se utiliza el SCP-860 para desbloquear y abrir una puerta, esta no conduce a su destino habitual, sino que se abre en un pequeño claro del bosque, designado además como SCP-860-1.

[SCP-895]
image path = 895.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-895 es un ataúd de roble adornado recuperado de la morgue de [DATOS ELIMINADOS].
text2 = El SCP-895 provoca interrupciones en los equipos de vigilancia de video y fotografía en un radio de 50 metros, similares a alucinaciones vividas y perturbadoras, con una duración y regularidad variables, correspondientes a la proximidad de la cámara al SCP-895. 
text3 = Dentro de un rango de 5 metros del SCP-895, las imágenes capturadas pueden causar un severo trauma psicológico e histeria en la mayoría de los sujetos.

[SCP-914]
image path = 914.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-914 es un gran dispositivo de relojería que pesa varias toneladas y cubre una superficie de dieciocho metros cuadrados, compuesto por transmisiones de tornillo, correas, poleas, engranajes, muelles y otros mecanismos de relojería.
text2 = Cuando se coloca un objeto en la cabina de entrada y se le da cuerda a la llave, SCP-914 ''refinara'' el objeto. No se pierde energía en el proceso, y el objeto se refina en base a la configuración especificada en el panel frontal de SCP-914.
text3 = No se debe introducir materia orgánica en el SCP-914 en ningún momento.

[SCP-939]
image path = 939.jpg
align x = left
align y = top
disablebackground = true
text1 = Los SCP-939 son depredadores endotérmicos, basados en una manada, que muestran una atrofia de varios sistemas similar a la de los organismos troglobios. Los SCP-939 miden una media de 2,2 metros de altura en posición vertical y pesan una media de 250 kg, aunque su peso es muy variable.
text2 = El principal método de SCP-939 para atraer a las presas es la imitación del habla humana en las voces de las victimas anteriores, aunque se ha documentado la imitación de otras especies y la caza nocturna activa.
text3 = Las presas suelen morir de un solo mordisco en el cráneo o el cuello; se han medido fuerzas de mordedura superiores a 35 MPa.

[SCP-966]
image path = 966.jpg
align x = left
align y = bottom
disablebackground = true
text1 = Los SCP-966 solo son visibles en longitudes de onda que van de los 700 nm a los 900 nm aproximadamente. Esto se aplica a todos los tejidos de SCP-966, independientemente de su estado actual.
text2 = Sus métodos de caza consisten en emitir una única ráfaga de un tipo de onda hasta ahora desconocida, que inhibe permanentemente la capacidad de la criatura afectada de entrar en cualquiera de las fases de sueno NREM y REM. También se pierde la capacidad de micro sueno.
text3 = Tras privar a sus víctimas del sueño, el SCP-966 acecha a su presa hasta que la falta de descanso la incapacita. En ese momento, SCP-966 procederá a consumirla.

[SCP-970]
image path = 970.jpg
align x = center
align y = center
disablebackground = true
text1 = El SCP-970 es un fenómeno espacial en el que un conjunto de habitaciones se encuentran en bucle sobre si mismas. En todos los casos encontrados, esto se produce mediante una serie de puertas que aparecen en las paredes, todas en línea recta, de forma que es posible caminar hacia delante y acabar en la posición inicial.
text2 = La alteración de las habitaciones no afecta a las habitaciones y pisos vecinos. Todavía no se conoce ninguna explicación para la aparición de este fenómeno.
text3 = Desde el primer descubrimiento del fenómeno SCP-970, se han descubierto otros __ ejemplos del fenómeno, el __% de ellos en un radio de 800 kilómetros del Sector 19.

[SCP-1025]
image path = 1025.jpg
align x = right
align y = bottom
text1 = SCP-1025 es un libro de tapa dura de aproximadamente 1.500 páginas. La portada y el lomo llevan el título ''La enciclopedia de las enfermedades''.
text2 = No se ha encontrado ningún otro ejemplar de un libro con ese título y editorial, y no existe ningún registro del editor.
text3 = Los lectores del libro parecen mostrar síntomas de cualquier enfermedad sobre la que leen. El efecto puede tardar entre _ y __ horas en manifestarse.

[SCP-1123]
image path = 1123.jpg
align x = center
align y = center
disablebackground = true 
text1 = SCP-1123 es un cráneo humano al que le falta la mandíbula inferior y todos los dientes. En el exterior de la escama frontal hay una escritura jemer moderna, escrita con sangre humana, que se traduce como ''Recuerda''. 
text2 = Las pruebas genéticas confirman que tanto el cráneo como la sangre son del mismo individuo. La escritura jemer está muy descolorida, y es invisible para la mayoría de los sujetos a más de 5 metros de distancia. 
text3 = Los sujetos que se encuentren a 1 metro o menos del objeto informaran de que la sangre esta fresca, como si estuviera ''todavía húmeda'', así como de otros fenómenos sensoriales anómalos, como olores, sonidos y respuestas táctiles.

[SCP-1162]
image path = 1162.jpg
align x = center
align y = center
disablebackground = true 
text1 = SCP-1162 es, actualmente, un agujero en la pared de bloques de hormigón de la Cámara de Contención 4 en el sitio [DATOS ELIMINADOS].
text2 = SCP-1162 se activa cuando un ser consciente mete la mano en los agujeros, momento en el que sus dedos tocan una superficie solida de tacto similar al de la ubicación actual de SCP-1162-ARC, y encuentran un objeto lo suficientemente pequeño como para pasar por el agujero.
text3 = Estos artículos han sido reconocidos universalmente como algo que el usuario ha perdido, o estaba buscando en algún momento de su vida.

[SCP-1499]
image path = 1499.jpg
align x = right
align y = bottom
disablebackground = true 
text1 = SCP-1499 es una máscara antigás soviética GP-5. Una prueba de hermeticidad realizada al objeto sugiere que este conserva su funcionalidad original.
text2 = Los efectos anómalos de SCP-1499 se activan cuando un humano se coloca SCP-1499 en la cabeza. Aproximadamente un segundo después de que el SCP-1499 este completamente fijado en la cabeza del sujeto, este desaparece de la vista y deja de ser detectable.
text3 = Al usar SCP-1499, los sujetos de prueba informan de un entorno completamente diferente al que tenían antes de usar SCP-1499.

[The Chaos Insurgency]
image path = chaos.jpg
align x = left
align y = bottom
disablebackground = true
text1 = La Insurgencia del Caos es un grupo disidente de la Fundación, creado por una célula rebelde que se hizo con varios SCP muy útiles en 1924.
text2 = La principal base de operaciones de la Insurgencia es desconocida, al igual que sus lideres. Esta organización es directamente antagónica a la Fundación, llegando a enfrentarse por el SCP en varias ocasiones. 
text3 = Se hace que el personal este atento a posibles incursiones, intentos de terrorismo y espías de la Insurgencia, y que notifique al mando cualquier comportamiento raro de sus colegas.

[Class-D Personnel]
image path = classd.jpg
align x = right
align y = bottom
text1 = El personal de clase D es el designado para manejar los objetos de nivel Keter.
text2 = El personal de clase D se recluta entre los reclusos. Se prefieren las personas condenadas; en tiempos de coacción, se puede autorizar el Protocolo 12, que permite el reclutamiento de inocentes o de personas encarceladas por delitos menores.
text3 = Todo el personal de clase D debe ser eliminado en el [DATOS ELIMINADOS], y un nuevo personal debe estar listo para reemplazarlo.

[CWM]
image path = cwm.jpg
align x = right
align y = bottom

[The SCP Foundation]
image path = foundationlogo.jpg
align x = left
align y = top
text1 = La Fundación SCP es una organización dedicada a la contención e investigación de artefactos y formas de vida anómalos.
text2 = ''SCP'' significa ''Procedimientos Especiales de Contención'' (y el lema no oficial de la Fundación, ''Asegurar, Contener, Proteger''), que resume tanto los objetivos como los métodos de las acciones de la Fundación.
