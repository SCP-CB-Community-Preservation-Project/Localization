[SFX\Room\Intro\Guard\Ulgrin\BeforeDoorOpen.ogg]
3.7=<voice=ulgrin,length=6>Kontrollstation, hier Agent Ulgrin. Erbitte Freigabe für die Zelle 3-11.
8.9=<r=128,g=128,b=128>[über funk] Verstanden.

[SFX\Room\Intro\Guard\Ulgrin\ExitCell.ogg]
1.37=<voice=ulgrin>Hey, Sie haben Arbeit für dich. Tu mir einen Gefallen und steig aus deiner Zelle.

[SFX\Room\Intro\Guard\Ulgrin\ExitCellRefuse1.ogg]
0=<voice=ulgrin,length=6>Bist du dumm oder so? Ich hab gesagt raus aus der Zelle. Wenn du nicht rauskommst, mach ich dir Feuer unter'm Arsch.

[SFX\Room\Intro\Guard\Ulgrin\ExitCellRefuse2.ogg]
0=<voice=ulgrin,length=5.5>Hör mal, Kumpel. Ich hab nicht den ganzen Tag Zeit. Ich versuche ja höflich zu sein. Wenn du nicht rauskommst, mach ich dir Feuer unter'm Arsch.

[SFX\Room\Intro\Guard\Ulgrin\CellGas1.ogg]
0=<voice=ulgrin,caption=true>*chuckle*
0.6=<voice=ulgrin,length=6.5>Du musst wohl das dümmste Testsubjekt sein, das wir je hatten! Naja egal. Schließt die Türen und dreht das Gas auf!

[SFX\Room\Intro\Guard\Ulgrin\CellGas2.ogg]
0=<voice=ulgrin,length=5.7>Oh, bin schon etwas entäuscht dass du dich nicht wehrst. Hab' mich schon gefreut, dir in die Fresse zu hauen.

[SFX\Room\Intro\Guard\Ulgrin\Escort1.ogg]
0=<voice=ulgrin,length=7.5>Folge mir einfach. Ach ja, wir haben Freigabe ungehorsame Testsubjekte umzubringen, mach also nichts dummes. 

[SFX\Room\Intro\Guard\Ulgrin\Escort2.ogg]
0=<voice=ulgrin,length=10>Folge mir einfach. Ach ja, wir haben Freigabe ungehorsame Testsubjekte, ähm, zu liquidieren. Ich rate dir nichts dummes zu tun.

[SFX\Room\Intro\Guard\Ulgrin\EscortRun.ogg]
0=<voice=ulgrin,length=4.3>Hey, Vollidiot! Du bist am Falschen Weg. Komm sofort hier wieder zurück.

[SFX\Room\Intro\Guard\Ulgrin\EscortRefuse1.ogg]
0=<voice=ulgrin>Mach hinne! Sie warten schon auf dich!

[SFX\Room\Intro\Guard\Ulgrin\EscortRefuse2.ogg]
0=<voice=ulgrin>Hör mal, Ich hasse meinen Job eh schon. Warum machst du es noch schwieriger für mich?

[SFX\Room\Intro\Guard\Ulgrin\EscortPissedOff1.ogg]
0=<voice=ulgrin,length=5.5>Auf diese Scheiße habe ich kein Bock. Ich hab' kein Problem damit dir eine Kugel ins Hirn zu jagen, wenn du nicht anfängst dich einzufügen.

[SFX\Room\Intro\Guard\Ulgrin\EscortPissedOff2.ogg]
