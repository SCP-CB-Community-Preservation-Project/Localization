[SFX\Room\Intro\Guard\Ulgrin\EscortKill1.ogg]
0=<voice=ulgrin,length=3.8>Weißt du was? Scheiß drauf. Wer nicht will, der hat schon. Wir holen uns einfach jemand anderen.

[SFX\Room\Intro\Guard\Ulgrin\EscortKill2.ogg]
0=<voice=ulgrin>Okay, Scheiß drauf. Wer nicht will, der hat schon. Wir holen uns einfach jemand anderen.

[SFX\Room\Intro\Guard\Ulgrin\EscortTerminated.ogg]
