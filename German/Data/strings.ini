[Option Tooltip]
; Graphics
vsync = "VSync" wartet, bis der Monitor seinen Aktualisierungszyklus beendet hat, bis nächste Bild berechnet wird, was Screen-Tearing verhindert. Die Bildrate des Spiels wird an die Bildwiederholfrequenz des Monitors gebunden, was Verzögerung bei der Eingabe zur Folge haben kann.
antialias = "Kantenglättung" wird genutzt, um die Kanten eines berechneten Bildes zu glätten, bevor es angezeigt wird, um Aliasing-Artefakte an den Rändern von Modellen zu vermindern.
gamma = "Gammakorrektur" wird verwendet, um die Helligkeit des Bildschirms auszubalancieren, falls das Spiel entweder zu dunkel oder zu hell erscheint. Ein zu hoher oder niedriger Wert kann dafür sorgen, dass die Grafik ausgewaschen und weniger detailliert wirkt.
texlod = "Textur-LOD-Bias" beeinflusst die Entfernung, in der sich die Detailstufe der Texturen ändert, um Aliasing zu verhindern. Ändere diese Option, wenn Texturen flackern oder zu verschwommen aussehen.
vram = Texturen die im VRAM gespeichert werden, laden schneller, haben aber auch schlechtere Texturqualität zur Folge.
hudoffset = "HUD-Verschiebung" bewegt die Anzeige des Ausdauer und Blinzel-Meters, sowie die Ansicht diverser Gegenstände an der Bildschirmmitte. Vorgesehen für Ultrawide-Monitore.
fov = "Sichtfeld" bestimmt den Bereich der Spieleansicht, der während des Spiels angezeigt wird.
viewbob = "Kameraschwenkung" beinflusst wie stark die Kamera bei der Fortbewegung schwenkt.
localaudio = Steuert, ob die Sprachausgabe das Englische Original, oder die des bereitgestellten Sprachpakets verwendet wird (Deutsch).
subtitles = Zeigt Text am unterem Bildschirmrand für aktuell gesprochene Dialoge an.
closedcaptions = Zeigt Text am unterem Bildschirmrand für aktuelle Geräuschkullisse an.

; Audio
musicvol = Passt die Lautstärke der Hintergrundmusik an. Ist die Leiste ganz nach links geschoben, wird die Musik stummgeschaltet.
soundvol = Passt die Lautstärke der Geräuschkullisse an. Ist die Leiste ganz nach links geschoben, werden Geräusche stummgeschaltet.
sfxautorelease = "Automatische Audiofreigabe" gibt Geräusche nach 5 Sekunden Inaktivität aus dem RAM frei. Verhindert Arbeitsspeicherprobleme.
usertrack = Passt die Möglichkeit an, über Kanal 1 des Radios benutzerdefinierte Musik abzuspielen. Hinzuzufügen unter: "SFX\Radio\UserTracks\". Drücke "1", während das Radio ausgewählt ist, um den Titel zu wechseln.
usertrackmode = Passt Wiedergabemodus für benutzerdefinierte Musik an. "Wiederholen" spielt Dateien in Alphabetischer Reihenfolge. "Zufällig" wählt zufällig aus.
usertrackmode.note = Der Zufallsmodus verhindert nicht, dass zuvor gespielte Titel sich wiederholen.
usertrackscan = Überprüft das Verzeichnis der benutzerdefinierten Musik erneut auf neue/entfernte Sounddateien.

; Controls
mousesensitivty = Passt die Empfindlichkeit des Mauszeigers an.
mousesmoothing = Passt die Glättung des Mauszeigers an.
binds = Konfiguriere die Tastenbelegung im Spiel.

; Advanced
showhud = Zeigt Blinzel- und Ausdauermeter an.
console = Aktiviert die Entwicklerkonsole. Lässt sich durch drücken von {0} während des Spielverlaufs öffnen.
console.note = Das Verwenden der Konsole deaktiviert Steam-Errungenschaften.
speedrunmode = Zeigt einen Timer an, und ändert wie die Spielzeit getrackt wird, um den Anforderungen von Speedrunning zu entsprechen.
numericseeds = Erlaubt es Startwerte als ganze Zahlen einzugeben, welche den internen Zufallszahlengenerator des Spiels beeinflussen. Ist kein Startwert eingegeben, wird die Anzahl der Millisekunden seit dem Starten des PCs verwendet.
achpopup = Zeigt eine Benachrichtigung an, wenn eine Errungenschaft freigeschalten wird.
launcher = Erlaubt es den Launcher zu reaktivieren, wenn dieser deaktiviert wurde.
showfps = Zeigt die FPS im oberen linken Bildschirmeck an.
framelimit = Passt die FPS auf einen gewünschten Wert an.
framelimit.note = 60 FPS oder höher ist meist bevorzugt. Solltest du jedoch starkes Ruckeln bemerken, versuche es mit einem niedrigeren Wert, um die Bildrate konstanter zu machen.

