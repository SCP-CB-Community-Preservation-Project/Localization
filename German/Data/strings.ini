cigarette.use_1 = "Ich hab nichts um sie anzuzünden. Ähm, vielleicht mit... vergiss es."
cigarette.use_2 = "Ich hab damit vor langer Zeit aufgehört."
cigarette.use_3 = "Selbst wenn ich jetzt eine wollte, hab ich nichts um sie anzuzünden."
