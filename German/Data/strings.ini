[Death Message]
008 =  Subjekt D-9341 wurde in Sektor [ZENSIERT] beim Verzehr von Dr. [ZENSIERT] aufgefunden. Subjekt wurde umgehend durch Nine-Tailed Fox liquidiert und zur Obduktion geschickt. Eine SCP-008 Infektion wurde bestätigt und der Körper daraufhin eingeäschert.
008.gate = Subjekt D-9341 wurde beim Umherlungern nahe {0} aufgefunden. Subjekt wurde umgehend durch Nine-Tailed Fox liquidiert und zur Obduktion geschickt. Eine SCP-008 Infektion wurde bestätigt und der Körper daraufhin eingeäschert.
008.gate.a = Tor A
008.gate.b = Tor B
008zombie = Subjekt D-9341. Todesursache: mehrere Schnittwunden und schwerer stumpfer Gewalteinwirkung, verursacht durch [DATEN GELÖSCHT], welcher mit SCP-008 infiziert war. Genanntes Subjekt wurde von Nine-Tailed Fox liquidiert.
012 = Subjekt D-9341 wurde in einer Blutlache neben SCP-012 aufgefunden. Subjekt scheint sich die Handgelenke aufgerissen und drei weitere Zeilen der Komposition hinzugefügt zu haben, bevor er verblutete.
035.chamber = Klasse-D Subjekt D-9341 wurde tot in SCP-035s Eindämmungszelle entdeckt. Die Augen, sowie Nase und Mund des Subjekts, weisen schwere Blutungen auf. Zur Obduktion geschickt.
035.tentacle = "Wir brauchen mehr als ein normales Reinigungsteam um das wieder in Lot zu bringen. Zwei riesige, lebhafte Tentakel-ähnliche Gliedmaße haben sich in der Kammer entwickelt. Eine solches Maß an Aggressivität kannten wir bisher nicht. Scheint so als hätten Sie einen unglücklichen Klasse-D zu Tode geprügelt während der Ausbruch war."
035.tentacle.office = "Eine riesiges, lebhaftes Tentakel-ähnliches Gliedmaß hat sich aus der Leiche eines Wissenschaftlers im Büro [ZENSIERT] entwickelt. Eine solches Maß an Aggressivität kannten wir bisher nicht. Scheint so als hätten Sie einen unglücklichen Klasse-D zu Tode geprügelt während der Ausbruch war."
049 = Eine aktive Instanz von SCP-049-2 wurde in [ZENSIERT] entdeckt. Von Nine-Tailed Fox liquidiert.
049.chamber = Drei aktive Instanzen von SCP-049-2 wurden im Tunnel außerhalb SCP-049s Eindämmungszelle entdeckt. Von Nine-Tailed Fox liquidiert.
0492 = Subjekt D-9341. Todesursache: mehrere Schnittwunden und schwere stumpfer Gewalteinwirkung, verursacht durch einer SCP-049-2 Instanz.
096 = Eine große Menge Blut wurde in [DATEN ZENSIERT] entdeckt. DNS bestätigt als Subjekt D-9341. Wahrscheinlich von SCP-096 [DATEN ZENSIERT].
106.pd = Subjekt D-9341. Körper teilweise verwest. Vermutlich handelt es sich hier um SCP-106s "Korrosionsseffekt". Körper wurde durch Einäscherung entsorgt.
106.pd.crushed = Zuätzlich zum typischen Erscheinungsbild der verwesten Opfer von SCP-106, weist das Subjekt Verletzungen auf, die wir bisher nicht kannten: ein großer Schädelbasisbruch, drei gebrochene Rippen sowie eine gebrochene Schulter und mehrere schwere Schnittwunden.
106.pd.fall = Zusätzlich zum typischen Erscheinungsbild der verwesten Opfer von SCP-106, weist das Subjekt mehre schwere Frakturen an beiden Beinen auf.
173 = Subjekt D-9341. Todesursache: Fataler Halswirbelbruch. Wahrscheinlich von SCP-173 angegriffen.
173.camera = Subjekt D-9341. Todesursache: Fataler Halswirbelbruch. Überwachungsaufnahmen bestätigen, dass das Subjekt von SCP-173 getötet wurde.
173.intro = Subjekt D-9341. Todesursache: Fataler Halswirbelbruch. Laut Sicherheitschef Franklin, der während des Eindämmungsbruchs von SCP-173s anwesend war, wurde das Subjekt, als die Störungen im elektrischen Netzwerk anfingen, von SCP-173 getötet.
173.doors = "Wenn ich mich nicht irre, war der Hauptzweck dieser Räume SCP-173 im Falle eines Eindämmungsbruchs zu hindern sich fortzubewegen. Wer zur Hölle ist also auf die Schnapsidee gekommen EINEN VERDAMMTEN MENSCH-GROßEN LÜFTUNGSSCHACHT hier einzubauen?"
205 = Der SCP-205 Zyklus scheint nun wieder ihren Normalen lauf zu nehmen, nachdem die Anomalien während [ZENSIERT] beobachtet wurden. Die Leiche von Subjekt D-9341 wurde in der Kammer entdekt. Subjekt weist mehrere stumpfe Gewalteinwirkungen auf, typisch für Personal die die Kammer betreten haben nachdem das Licht ausgeschalten ist.
420js = Subject D-9341 found in a comatose state in [DATA REDACTED]. The subject was holding what appears to be a cigarette while smiling widely. Chemical analysis of the cigarette has been inconclusive, although it seems to contain a high concentration of an unidentified chemical whose molecular structure is remarkably similar to that of tetrahydrocannabinol.
427 = "Fordere Verstärkung von MTF Nu-7 an. Wir brauchen mehr Feuerkraft um dieses Ding den garaus zu machen."
895 = "Wir wissen dass er an einem Herzinfarkt starb. Ich vermute dass SCP-895 daran schuld ist, obwohl wir noch nie bemerkt haben dass es Bildschirme aus solch einer Distanz befällt. Weitere Tests sind notwendig um zu bestimmen ob sich SCP-895s 'Rote Zone' erweitert."
895.nvg = "Der Klasse-D betrachtete SCP-895 durch ein digitales Nachtsichtgerät, was ihn tötete."
895.finenvg = "Ein Klasse-D betrachtete SCP-895 durch ein digitales Nachtsichtgerät, welches wahrscheinlich von SCP-914 verfeinert wurde. Möglicherweise konnte das Subjekt den Memetischen Einflüssen teilweise standhalten. Das Gerät wurde für eine Analyse verwahrt"
914.rough = "Eine sehr verstümmelte Leiche wurde im Ausgabekammer von SCP-914 entdeckt. DNS-Analyse identifiziert die Leiche als Klasse-D Subjekt D-9341. Das Subjekt wurde offensichtlich von SCP 914 auf der 'Rau' Einstellung 'verfeinert', aber wir sind immer noch verwirrt wie er in der Eingabekammer gelandet ist, oder wer den Schlüssel betätigt hat.
914.superman = Ein Klasse-D Overall wurde in [DATEN ZENSIERT] gefunden. Nach weiterer Analyse, stellte man fest dass der Overall mit etwa 12.5 kg einer blauen, Asche-ähnlichen Substanz gefüllt war. Chemische Analyse der Substanz ist unzureichend. Steht vermutlich mit SCP-914 in Verbindung.
939 = "Alle Vier (4) flüchtige SCP-939 Exemplare, wurden eingefangen und erfolgrei wieder verwahrt. Drei (3) haben ein echtes Tohuwabohu nahe Lagerbereich 6 veranstaltet. Ein Reinigungsteam wurde entsandt."
1025.cardiacarrest = "Er starb an einem Herzinfarkt nachdem er SCP-1025 las, dass ist offensichtlich. Gibt es psychosomatische Herzinfarkte überhaupt, oder hat SCP-1025 noch weitere anormale Eigenschaften von denen wir nichts wissen?
1123 = Subject D-9341 was shot dead after attempting to attack a member of Nine-Tailed Fox. Surveillance tapes show that the subject had been wandering around the site approximately 9 minutes prior, shouting the phrase "get rid of the four pests" in chinese. SCP-1123 was found in [REDACTED] nearby, suggesting the subject had come into physical contact with it. How exactly SCP-1123 was removed from its containment chamber is still unknown.
; LEST SAYS: UNUSED MESSAGE, translate anyway?
1048a = Eine Leiche überzogen von Ohren wurde in [ZENSIERT] gefunden. Das Subjekt wurde vermutlich von einer SCP-1048-A Instanz angegriffen und erstickt. Die Leiche wurde zur Obduktion geschickt.
1162 = Ein totes Klasse-D Subjekt wurde in der Eindämmungszelle von SCP-1162 aufgefunden. Obduktion ergab dass die rechte Lunge fehlt, was auf eine Interaktion mit SCP-1162 schließt.
1499 = Der Auffenthaltsort von SCP-1499 ist immer noch unklar, aber ein Aufklärungsteam wurde entsandt, einen gewaltamen Angriff in einer Kirche, Laut Berichten im russischem Dorf [ZENSIERT] zu untersuchen.
14991 = Ein unbekannter Mann und ein toter Klasse-D wurden in [ZENSIERT] von Nine-Tailed Fox entdeckt. Der Mann wurde als sehr aufgeregt bezeichnet und scheint nur Russisch zu spechen. Er wurde in einem zeitweiligen Verwahrungsbereich in [ZENSIERT] aufgenommen, während er auf einen Dolmetscher wartet.
14991.dimension = Personal welches sich im Evakuierungsbunker LC-2 während des Eindämmungsbruchs befand, wurden aufgrund von Vorfall 1499-E mit Klasse-B Amnestika behandelt. Das Klasse-D Subjekt, welches in das Ereignis involviert war, starb kurz nachdem es von Agent [ZENSIERT] erschossen wurde.
guard.intro = Subjekt D-9341. Todesursache: Kopfschuss. Die Überwachungsvideos bestätigen dass das Subjekt von Agent Ulgrin liquidiert wurde, kurz nach der Abriegelung der Anlage.
guard.gate.b = "Agent G. zu Kontrollstation. Habe einen flüchtigen Klasse-D im Innenhof von Tor B eleminiert."
apache = "CH-2 zu Kontrollstation. Hab' einen flüchtigen Klasse-D bei {0} erschossen."
apache.gate.a = Tor A
apache.gate.b = Tor B
ntf = Subjekt D-9341. Von Nine-Tailed Fox liquidiert.
ntf.bloodloss = Subjekt D-9341. Starb an Blutverlust nach Feuerbeschuss durch Nine-Tailed Fox.
tesla = Subjekt D-9341 starb an einem Stromschlag, durch Tesla-Tor, nahe [ZENSIERT].
killbat = Subjekt D-9341 wurde tot innerhalb SCP-914s Ausgabekammer gefunden, neben einer scheinbar belanglosen 9-Volt-Batterie. Das Subjekt ist von schweren Stromverbrennungen überzogen, und wurde wahrscheinlich durch einen Stromschlag der Batterie umgebracht. Batterie wurde für weitere Untersuchung verwahrt.
suicide_1 = [ZENSIERT]
suicide_2 = Subjekt D-9341 tot in Sektor-[ZENSIERT] gefunden. Das Subjekt weist keine Spuren physischer Gewalt auf und es gibt keine erkennbare Todesursache. Der Leichnahm wurde zur Obduktion übersandt.
suicide_3 = EXCP_ACCESS_VIOLATION
suicide_4 = Subjekt D-9341 tot in Sektor-[ZENSIERT] gefunden. Das Subjekt scheint "lösch dich" in seinem eigenem Blut neben sich gekritzelt zu haben. Keine anderen Anzeichen für physische Gewalt oder einen Kampf konnten gefunden werden. Zur Obduktion geschickt.
gassed = Subjekt D-9341 tot in [DATEN ZENSIERT] gefunden. Todesursache: Ersticken aufgrund von Dekontaminationsgas.

