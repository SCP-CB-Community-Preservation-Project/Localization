[Mobile Task Forces]
image path = mtf.jpg
align x = center
align y = center
text1 = MTFs (Mobile Task Force: Mobile-Einsatztrupps) sind keine Einheiten, (meißt zehn bis zwanzig Mann stark, wobei fünfzig Mann auch möglich sind) die für gewisse Rollen und Situationen ausgebildet sind.
text2 = Mobile Task Force E-11 ("Nine-Tailed Fox") ist eine streng ausgebildete Einsatztruppe, die sich auf Schutz und Wiederverwahrung von SCP-Gegenstände auf Site-[DATEN ZENSIERT] spezialisiert.
text3 = Ihr Aufgabenbereich besteht darin, während eines Eindämmungsbruchs aktive, gewaltätige SCP-Instanzen einzufangen, überlebendes Foundation-Personal zu retten und abtrünniges Klasse-D Personal zu terminieren. 
;LEST SAYS: No specific translation on German SCP Wiki for Nine-Tailed Fox unit.

[Night Vision Goggles]
image path = NVG.jpg
align x = right
align y = top
disablebackground = true
text1 = Eine Standardaustattung Nachtsichtgeräte werden MTF Einheiten im Falle eines Stromausfalls ausgestellt.
text2 = Wissenschaftler erhalten sie auch, aber im Falle eines Blackouts sollten sie sich auf die Evakuierung konzentrieren.

[SCP-012]
image path = 012.jpg
align x = right
align y = top
disablebackground = true
text1 = SCP-012 wurde vom Archäologen K.M. Sandoval während der Ausgrabung eines norditalienischen Grabs geborgen. Das Objekt, ein handgeschriebenes Musikstück mit dem Titel "On Mount Golgotha", scheint unvollständig zu sein.
text2 = Die rot-schwarze Tinte, von der zuerst angenommen wurde, dass sie aus einer Art Beeren oder natürlichem Farbstoff besteht, wurde später als menschliches Blut identifiziert.
text3 = Nach ersten Untersuchungen wurde mehreren Testpersonen Zugang zum Musikstück erlaubt. In jedem Fall verstümmelten sich die Subjekte selbst, um ihr eigenes Blut für die Vollendung des Stücks zu nutzen, was Symptome von Psychose und schwere Verletzungen zufolge hatte. 

[SCP-035]
image path = 035.jpg
align x = right
align y = top
disablebackground = true
text1 = SCP-035 scheint eine weiße Porzellankomödienmaske zu sein, obwohl es sich zuweilen zur Tragödie ändern kann.
text2 = Wenn SCP-035 auf dem Gesicht eines Subjektes sitzt, überschreibt ein alternatives Gehirnwellenmuster von SCP-035 das des Wirtes, welches es effektiv auslöscht und den Hirntod des Subjektes herbeiführt. Das Subjekt behauptet dann, dass es willentlich von SCP-035 kontrolliert wird.
text3 = Vie psychologische Analyse von SCP-035 hat aufgedeckt, dass es ein stark manipulatives Wesen besitzt, das dazu fähig ist, plötzliche und umfassende Änderungen am seelischen Zustand des Interviewers zu erzwingen. SCP-035 hat sich als höchst sadistisch erwiesen und fordert einige auf, Selbstmord zu begehen.

[SCP-049]
image path = 049.jpg
align x = left
align y = center
disablebackground = true
text1 = SCP-049 is humanoid in appearance; however, the Foundation is currently incapable of studying its face and body more fully, as it is covered in what appears to be the garb of the traditional Plague Doctor from 15-16th century Europe.
text2 = SCP-049's touch is invariably lethal to humans. After contact with SCP-049's hand(s), the victim (hereafter referred to as SCP-049-2) suffers [DATA EXPUNGED] and dies within moments.
text3 = SCP-049 then produces a bag made of [DATA EXPUNGED] containing scalpels, needle, thread, and several vials of an as-yet-unidentified substance and begins dissecting SCP-049-2, as well as inserting various chemicals into the body. 
text4 = After approximately 20 minutes, SCP-049 will sew SCP-049-2 back up and become docile once more. After a period of a few minutes, SCP-049-2 will resume vital signs and appears to reanimate.
;LEST SAYS: SCP-049s wiki page has undergone a revision since the games release. Therefore, wiki description inside the game is not accurate with current entry. Translation pending consensus reached.


[SCP-066]
image path = 066.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-066 ist eine amorphe Masse aus geflochtenem Garn und Bändern, die etwa 1 Kilogramm wiegt.
text2 = Nach Vorfall 066-2 (siehe Vorfallbericht 066-2) begann SCP-066 Eigenschaften aufzuweisen, welche höchst widersprüchlich zu seinem früheren Verhalten sind.
text3 = SCP-066 zeigt nun signifikante Mobilität. Zusätzlich wird SCP-066 automatisch Noten und Effekte produzieren, wenn Menschen anwesend sind, unabhängig davon, ob die Menschen mit SCP-066 interagieren.

[SCP-079]
image path = 079.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-079 ist ein "Exidy Sorcerer" Computer, Baujahr 1978.
text2 = Es ist nicht bekannt, wann SCP-079 empfindsam wurde, aber es ist bekannt, dass SCP-079 sich zu einem Punkt weiterentwickelt hat, den Computer nicht erreichen sollten. Nicht mal in unserer Fantasie.
text3 = Es hat den Turing-Test bestanden und ist sehr gesprächig, allerdings sehr hasserfüllt und unhöflich im Tonfall. Es hat seinen Wunsch zu entkommen nicht vergessen.

[SCP-096]
image path = 096.png
align x = right
align y = bottom
disablebackground = true
text1 = SCP-096 ist normalerweise fügsam. Die Drucksensoren zeigen, dass er die meiste Zeit des Tages ausgerichtet zur Ostwand verbringt.
text2 = Wenn jedoch jemand das Gesicht von SCP-096 sieht, egal ob direkt, per Videoaufnahme oder sogar auf einem Foto, tritt es in eine eine Phase emotionaler Anspannung ein.
text3 = Nach ungefähr ein bis zwei Minuten nach dem ersten Sichtkontakt rennt SCP-096 zu der Person, die ihm ins Gesicht gesehen hat.

[SCP-106]
image path = 106.jpg
align x = right
align y = bottom
text1 = SCP-106 hat die Erscheinung eines älteren Mannes und weist fortgeschrittene Zersetzungsmerkmale auf. Diese Erscheinung kann variieren, doch die "verrotteten" Eigenschaften werden bei allen Erscheinungsformen beobachtet.
text2 = SCP-106 verursacht einen “Korrosions”-Effekt in jeglicher fester Materie, die es berührt. Dadurch entsteht ein physischer Zusammenbruch der Materie binnen Sekunden nach dem Kontakt. Dabei wurde ein Rosten, Verrotten oder Zerbrechen der Materien beobachtet, sowie die Bildung einer schwarzen, schleimigen Substanz, die Ähnlichkeit mit der Masse hat, die SCP-106 umhüllt.
text3 = SCP-106 hat die Fähigkeit, durch feste Materie zu gehen. Es wird vermutet dass es sein Opfer verschleppt und in seiner persönlichen "Taschendimension" umbringt.
;LEST SAYS: More page revisions made this harder.

[SCP-173]
image path = 173.jpg
align x = left
align y = bottom
text1 = SCP-173 ist aus Beton und Bewehrungsstäben mit Spuren von Sprühfarbe der Marke Krylon gebaut. Es ist bewegungsfähig und extrem feindselig.
text2 = Das Objekt kann sich nicht bewegen, wenn es innerhalb einer direkten Blickachse liegt. Der Blickkontakt mit SCP-173 darf keinesfalls unterbrochen werden. Personal, das beauftragt wurde den Container zu betreten, ist angewiesen einander ihr Blinzeln anzukündigen.

[SCP-205]
image path = 205.jpg
align x = right
align y = bottom
disablebackground = true
text1 = SCP-205 ist ein Paar Flutlichtlampen, die in der Fotografie verwendet wurden. Das von jeder Lampe ausgestrahlte Licht verhält sich in einer für SCP-205 einzigartigen Weise und durchdringt jede Oberfläche, die nicht weiß ist.
text2 = Wenn das Licht, durch keine Materie unterbrochen, fortschreitet und keine Schatten wirft, wird jede Lampe einen Schatten einer nicht identifizierten jungen Frau auf jeder flachen weißen Oberfläche, z. B. dem Projektionsschirm in Kammer 52, zeigen. 

[SCP-294]
image path = 294.jpg
align x = center
align y = bottom
disablebackground = true
text1 = Gegenstand SCP-294 scheint ein gewöhnlicher Kaffeeautomat zu sein. Der einzige bemerkbare Unterschied ist ein Eingabefeld mit Tasten, die der englischen QWERTY-Tastatur entsprechen. 
; LEST SAYS: Change to QWERTZ for German loc and edit?
text2 = Nach eingabe des Names einer beliebigen Flüssigkeit über das Bedienfeld einzugeben. Danach wird ein gewöhnlicher 12-Unzen-Pappbecher im Ausgabeschacht platziert und die gewünschte Flüssigkeit eingefüllt.
text3 = Siebenundneunzig Initialtests wurden durchgeführt (inklusive Anfragen für Wasser, Kaffee, Bier und Mineralwasser, nicht-konsumierbare Flüssigkeiten wie Schwefelsäure, Wischwasser und Motoröl, sowie Substanzen, die im Normalfall nicht flüssig sind, wie Stickstoff, Eisen und Glas) und jeder war erfolgreich.

[SCP-372]
image path = 372.jpg
align x = left
align y = bottom
disablebackground = true
text1 = SCP-372 ist ein Geschöpf unbekannter Gattung, welches vom Kopf bis zur Schwanzspitze eine Länge von etwa 2 Metern aufweist und ungefähr 45 kg wiegt. Es hat einen langen, dünnen Körper mit acht schlanken Beinpaaren.
text2 = SCP-372 hat gelernt, seine Bewegungen an diese Impulse anzupassen und somit die Bewegungen der Kreaturen um es herum vorherzusehen. Es wendet diese Technik an, um sich zu verstecken, entweder indem es sich hinter dem Kopf der Person verbirgt, die es sucht, oder indem es sich in ihrem Skotom (blinden Fleck) und ihren Sakkaden (Verschwimmen während Augenbewegung) aufhält.
text3 = Im Falle eines Eindämmungsbruchs wird ein Alarm ausgelöst, der alle Mitarbeiter dazu aufruft, auf schnelle, schemenhafte Bewegungen am Rande ihres Sichtfeldes zu achten und es sofort zu melden, wenn solche bemerkt werden.

[SCP-427]
image path = 427.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-427 ist ein kleines, kugelförmiges, graviertes Medaillon, das aus poliertem Silber besteht. Die Gravuren scheinen keine Funktion zu erfüllen.
text2 = SCP-427 wurde erschaffen nachdem eine SCP-500-Pille in die Eingabe-Kabine von SCP-914 eingelegt und die Fein-Einstellung benutzt worden war. Es zeigt keine ungewöhnlichen Aktivitäten wenn es geschlossen ist. Wird es geöffnet und biologischem Gewebe ausgesetzt, regeneriert es Zellschäden rapide und ist auf irgendeine Weise fähig invasive Verbindungen und Infektionen zu entfernen.
text3 = Langzeitexposition erzeugt allerdings signifikante gesundheitliche Gefahren. Während das Medaillon Schaden heilt, optimiert es die natürlichen Systeme des Körpers. Klasse-D-Personal, das dem Objekt über eine Stunde ausgesetzt war, begann zu einer formlosen Gewebemasse zu mutieren.
text4 = Die erschaffenen "Fleischbestien" sind unglaublich aggressiv und attackieren bei Herstellung von Sichtkontakt sämtliches Personal mit tödlichem Ausgang. Sie sind hochresistent gegen die meisten bekannten Waffen.

[SCP-500]
image path = 500.jpg
align x = right
align y = bottom
text1 = SCP-500 ist eine kleine Plastikdose, die zum Zeitpunkt dieses Eintrags siebenundvierzig (47) rote Pillen enthält.
text2 = Eine Tablette, wenn oral eingenommen, heilt das Subjekt innerhalb von zwei Stunden effektiv von jeder Krankheit, die exakte Zeit hängt von Schwere und Anzahl der Krankheiten des Subjekts ab.
text3 = Trotz umfangreicher Versuche ist es bislang nicht gelungen, mehr von der Substanz, die als aktiver Bestandteil der Tablette angesehen wird, zu synthetisieren.

[SCP-513]
image path = 513.jpg
align x = center
align y = center
disablebackground = true
text1 = Physisch ist SCP-513 eine unscheinbare, rostige Kuhglocke. Aufgrund der weitreichenden Korrosion sind keine Zeichen oder Gravuren auf ihrer Oberfläche sichtbar.
text2 = Ungefähr eine Stunde nach der Aussetzung von SCP-513 erzeugten Geräuschen einen flüchtigen Blick auf SCP-513-1 zu erhaschen.
text3 = Alle bisherigen Verhöre deuten darauf hin, dass SCP-513-1 ein großer, ausgezehrter Humanoid mit abnormal großen Händen ist.

[SCP-682]
image path = 682.jpg
align x = right
align y = bottom
text1 = SCP-682 ist eine große, entfernt reptilienartige Kreatur unbekannter Herkunft. Es scheint alles Leben zu hassen und hat dies in mehreren Befragungen während der Isolation zum Ausdruck gebracht.
text2 = SCP-682 wies stets extreme Stärke, Geschwindigkeit und Reflexe auf, wenngleich sich dies mit seiner Form verändert. SCP-682s regenerative Fähigkeiten und Widerstandsfähigkeit sind überwältigend, und es konnte sich mit einem zu 87 % zerstörten oder verrotteten Körper bewegen und sprechen.
text3 = SCP-682 muss schnellstmöglich zerstört werden. 

[SCP-714]
image path = 714.jpg
align x = center
align y = center
disablebackground = true
text1 = Scheinbar nichts anderes als ein grüner Jadering, hat sich SCP-714 als in der Lage gezeigt, sich auszudehnen und zusammenzuziehen, um perfekt an den Finger von jedem zu passen, der es berührt, obwohl dies die unwichtigste seiner Eigenschaften ist. 
text2 = SCP-714 hat mehrere Haupteffekte. Innerhalb von Minuten nach dem Anlegen von SCP-714 berichten die Träger, dass sie sich körperlich und geistig erschöpft fühlen.
text3 = Träger von zeigen SCP-714 eine ungewöhnlich hohe Widerstandsfähigkeit gegenüber memetischen und mentalen Einflüssen, insbesondere Befehlen oder unmittelbaren Auswirkungen.

[SCP-860]
image path = 860.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-860 is a dark blue key of unremarkable shape.
text2 = At seemingly random intervals of time, a series of numbers will appear on the key's blade. These were later found to be UTM coordinates.
text3 = SCP-860 can fit and unlock any traditional door lock that requires a key located in the area of the given coordinates.
text4 = When SCP-860 is used to unlock and open a door, the door does not lead to its usual destination. Instead, it opens into a small forest clearing, further designated as SCP-860-1.

[SCP-895]
image path = 895.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-895 is an ornate oak coffin recovered from the [REDACTED] Mortuary.
text2 = SCP-895 causes disruptions in video and photographic surveillance equipment within 50 meters similar to vivid, disturbing hallucinations with variable duration and regularity corresponding to the camera's proximity to SCP-895. 
text3 = Within a range of 5 meters from SCP-895, footage captured can cause severe psychological trauma and hysteria in most subjects.

[SCP-914]
image path = 914.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-914 is a large clockwork device weighing several tons and covering an area of eighteen square meters, consisting of screw drives, belts, pulleys, gears, springs and other clockwork.
text2 = When an object is placed in the Intake Booth and the key is wound up, SCP-914 will "refine" the object. No energy is lost in the process, and the object is refined based on the setting specified on 914's front panel.
text3 = No organic matter is to be entered in to SCP-914 at any time.

[SCP-939]
image path = 939.jpg
align x = left
align y = top
disablebackground = true
text1 = SCP-939 are endothermic, pack-based predators which display atrophy of various systems similar to troglobitic organisms. SCP-939 average 2.2 meters tall standing upright and weigh an average of 250 kg, though weight is highly variable.
text2 = SCP-939's primary method of luring prey is the imitation of human speech in the voices of prior victims, though imitation of other species and active nocturnal hunts have been documented.
text3 = Prey is usually killed with a single bite to the cranium or neck; bite forces have been measured in excess of 35 MPa.


[SCP-966]
image path = 966.jpg
align x = left
align y = bottom
disablebackground = true
text1 = SCP-966 are visible only at wavelengths ranging from 700 nm to about 900 nm. This applies to all of SCP-966's tissues, regardless of their current state.
text2 = Their hunting methods consist on emitting a single burst of a previously unknown type of wave, which permanently inhibits the ability of the affected creature to enter in any of the NREM and REM sleep stages. The ability to micro sleep is also lost.
text3 = After depriving their victims of sleep, SCP-966 will stalk their prey until the lack of rest incapacitates it. At this point, SCP-966 will proceed to consume it.


[SCP-970]
image path = 970.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-970 is a spatial phenomenon wherein a collection of rooms are looped on themselves. In all cases found, this is by means of a series of doors appearing in the walls, all in a straight line, such that it is possible to walk forwards and end up at the starting position.
text2 = The alteration to the rooms does not affect neighbouring rooms and floors. There is as of yet no known explanation for the appearance of this phenomenon.
text3 = Since the first discovery of the SCP-970 phenomenon, further such examples of the phenomenon have been discovered, with [DATA REDACTED]% of these in a 800-kilometer radius of Sector 19.

[SCP-1025]
image path = 1025.jpg
align x = right
align y = bottom
text1 = SCP-1025 is a hardcover book, approximately 1,500 pages long. The front cover and spine feature the title "The Encyclopedia of Common Diseases".
text2 = No other copies of a book with that title and publisher have been found, and no record of the publisher exists.
text3 = Readers of the book seem to exhibit symptoms of any disease they read about. The effect can take between _ and __ hours to manifest.

[SCP-1123]
image path = 1123.jpg
align x = center
align y = center
disablebackground = true 
text1 = SCP-1123 is a human skull missing the lower mandible and all its teeth. Across the exterior squama frontalis is modern Khmer script, written in human blood, that translates as "Remember".
text2 = Genetic testing confirms that both the skull and the blood are from the same individual. The Khmer script is badly faded, and invisible to most subjects beyond 5 meters distance.
text3 = Subjects at 1 meter or less from the object will report the blood being fresh, as if "still wet", as well as other anomalous sensory phenomena, including smells, sounds, and tactile responses.

[SCP-1162]
image path = 1162.jpg
align x = center
align y = center
disablebackground = true 
text1 = SCP-1162 is, currently, a hole in a cinderblock wall at Site-[DATA REDACTED].
text2 = SCP-1162 is activated when a sentient being reaches into the holes, at which point their fingers touch a solid surface similar in feel to the current location of SCP-1162, and they discover an item small enough to fit through the hole.
text3 = These items have universally been recognized as something that the user has lost, or was searching for at some point during their life.

[SCP-1499]
image path = 1499.jpg
align x = right
align y = bottom
disablebackground = true 
text1 = SCP-1499 is a Soviet GP-5 gas mask. A seal test performed on the object suggests that the object retains its original functionality.
text2 = The anomalous effects of SCP-1499 activate when a human places SCP-1499 on their head. Approximately one second after SCP-1499 is fully secured on the subject's head, the subject vanishes from view, and is no longer detectable.
text3 = Upon wearing SCP-1499, test subjects report completely different surroundings than they were in prior to wearing SCP-1499.

[The Chaos Insurgency]
image path = chaos.jpg
align x = left
align y = bottom
disablebackground = true
text1 = "Der Chaos-Aufstand" ist eine Splittergruppe der Foundation, gegründet von Abtrünnigen, die sich 1924 mit mehreren sehr nützlichen SCP-Objekten davongemacht haben.
text2 = Die Operationsbasis des Aufstands ist ebenso unbekannt wie ihre derzeitigen Anführer. Diese Organisation ist der Foundation gegenüber geradezu antagonistisch, und hat mehrfach tödliche Gewalt eingesetzt, um die Bergung von SCPs durch die Foundation zu verhindern.
text3 = Personal muss sich der Möglichkeit von Überfällen, Anschlägen, und Spionen der Insurgency bewusst sein, und Vorgesetzte über jegliches verdächtige Verhalten anderer Mitarbeiter informieren.

[Class-D Personnel]
image path = classd.jpg
align x = right
align y = bottom
text1 = Class-D personnel are designated staff used to handle the Keter-level objects.
text2 = Class-D personnel are recruited from prison inmates. Condemned persons are preferred; in times of duress, Protocol 12 can be authorized, allowing recruitment of innocents or persons incarcerated for lesser crimes.
text3 = All Class-D personnel are to be terminated at the first of the month, and a new staff must be ready to replace them.

[CWM]
image path = cwm.jpg
align x = right
align y = bottom

[The SCP Foundation]
image path = foundationlogo.jpg
align x = left
align y = top
text1 = The SCP Foundation is an organization dedicated to the containment and research of anomalous artifacts and lifeforms.
text2 = "SCP" stands for "Special Containment Procedures" (and the official motto of the foundation, "Secure, Contain, Protect.") - which sums up both the goals and methods of the Foundation's actions.
