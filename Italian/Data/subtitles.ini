1.9=<voice=pa,length=7.2>Non dimenticate: oggi è il Pizzadì. Accorrete alla mensa per prendervi una bella fetta calda.

[SFX\Room\Intro\PA\scripted\announcement2.ogg]
1.85=<voice=pa,length=7.7>Ricordate, la sicurezza è il primo passo verso un ambiente lavorativo sicuro. Restate sicuri, restate vigili.

[SFX\Room\Intro\PA\scripted\announcement3.ogg]
2.0=<voice=pa,length=11>Promemoria per tutto il personale: ogni giovedì dalle 17 alle 18 sono tenuti seminari motivazionali presso l'Auditorium della struttura. Venite a farvi motivare!

[SFX\Room\Intro\PA\scripted\announcement4.ogg]
1.95=<voice=pa,length=8.8>Ricordate di segnalare qualsiasi attività sospetta ai vostri supervisori. Nessuno è escluso dal controllo. Restate paranoici. Restate vigili.

[SFX\Room\Intro\PA\scripted\announcement5.ogg]
