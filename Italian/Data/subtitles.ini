[SFX\Room\Intro\Guard\Ulgrin\BeforeDoorOpen.ogg]
3.7=<voice=ulgrin,length=6>Comando, qui Agente Ulgrin. Richiedo l'apertura della Cella 3-11.
8.9=<r=128,g=128,b=128>[dalla radio] Ricevuto.

[SFX\Room\Intro\Guard\Ulgrin\ExitCell.ogg]
1.37=<voice=ulgrin>Ehi, c'è del lavoro per te. Fammi un favore ed esci da lì.

[SFX\Room\Intro\Guard\Ulgrin\ExitCellRefuse1.ogg]
0=<voice=ulgrin,length=6>Che c'è, sei stupido per caso? Ti ho detto di uscire dalla cella. Se non esci subito, ti prendo a calci in culo.

[SFX\Room\Intro\Guard\Ulgrin\ExitCellRefuse2.ogg]
0=<voice=ulgrin,length=5.5>Senti amico, non ho tutto il giorno. Sto cercando di essere cortese. Se non esci da lì, ti prendo a calci in culo.

[SFX\Room\Intro\Guard\Ulgrin\CellGas1.ogg]
0=<voice=ulgrin,caption=true>*risata*
0.6=<voice=ulgrin,length=6.5>Devi essere la cavia più stupida che abbiamo mai avuto! Bene, chiudete la porta e aprite le valvole del gas.

[SFX\Room\Intro\Guard\Ulgrin\CellGas2.ogg]
0=<voice=ulgrin,length=5.7>Hmm, devo dire che sono deluso, mi aspettavo resistenza. Non vedevo l'ora di prenderti a pugni in faccia.

[SFX\Room\Intro\Guard\Ulgrin\Escort1.ogg]
0=<voice=ulgrin,length=7.5>Seguimi. Ah, comunque, siamo autorizzati ad uccidere ogni cavia disobbediente, quindi non fare cazzate.

[SFX\Room\Intro\Guard\Ulgrin\Escort2.ogg]
0=<voice=ulgrin,length=10>Seguimi. Ah, comunque, siamo autorizzati a sterminare qualsiasi cavia disobbediente, quindi ti consiglio di non fare cazzate.

[SFX\Room\Intro\Guard\Ulgrin\EscortRun.ogg]
0=<voice=ulgrin,length=4.3>Ehi, coglione! Stai andando dalla parte sbagliata! Vieni subito qui.

[SFX\Room\Intro\Guard\Ulgrin\EscortRefuse1.ogg]
0=<voice=ulgrin>Muoviti! Ti stanno aspettando!

[SFX\Room\Intro\Guard\Ulgrin\EscortRefuse2.ogg]
0=<voice=ulgrin>Senti amico, il mio lavoro fa già abbastanza schifo, perché mi stai rendendo le cose più difficili?

[SFX\Room\Intro\Guard\Ulgrin\EscortPissedOff1.ogg]
0=<voice=ulgrin,length=5.5>Non ho tempo per le tue stronzate. Non mi faccio problemi a farti saltare le cervella se non inizi a collaborare.

[SFX\Room\Intro\Guard\Ulgrin\EscortPissedOff2.ogg]
0=<voice=ulgrin,length=5.5>Non ho tempo per le tue stronzate! Non mi faccio problemi a piantarti una pallottola in testa se non inizi a collaborare.

[SFX\Room\Intro\Guard\Ulgrin\EscortKill1.ogg]
0=<voice=ulgrin,length=3.8>Sai cosa? Va bene, come vuoi. Prenderemo qualcun altro.

[SFX\Room\Intro\Guard\Ulgrin\EscortKill2.ogg]
0=<voice=ulgrin>Va bene, come vuoi. Prenderemo qualcun altro.

[SFX\Room\Intro\Guard\Ulgrin\EscortTerminated.ogg]
3.1=<voice=ulgrin,length=4.5>Mi sbarazzo del corpo, tu intanto vai a prendermi qualcun altro...

[SFX\Room\Intro\Guard\Ulgrin\EscortDone1.ogg]
0=<voice=ulgrin,length=6.7>[a te] Eccoci qui. Entra lì, segui le istruzioni e andrà tutto bene... probabilmente.

[SFX\Room\Intro\Guard\Ulgrin\EscortDone2.ogg]
0=<voice=ulgrin>[a te] Eccoci qui. Sono ancora deluso per non aver avuto l'occasione di prenderti a pugni... ma fa niente.

[SFX\Room\Intro\Guard\Ulgrin\EscortDone3.ogg]
0=<voice=ulgrin,length=5.5>[a te] Eccoci qui. Sono ancora deluso per non aver avuto l'occasione di darti un pugno in faccia... ma fa niente.

[SFX\Room\Intro\Guard\Ulgrin\EscortDone4.ogg]
0=<voice=ulgrin,length=9.0>[a te] Entra lì dentro, segui le istruzioni e andrà tutto bene... probabilmente. O forse no. In ogni caso, non mi importa più di tanto.

[SFX\Room\Intro\Guard\Ulgrin\EscortDone5.ogg]
0=<voice=ulgrin>[to you] Comunque, non perdiamo altro tempo. Ti stanno aspettando nella cella.

[SFX\Room\Intro\Guard\Ulgrin\OhAndByTheWay.ogg]
0=<voice=ulgrin>Ah, comunque.

