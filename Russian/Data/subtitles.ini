[SFX\Room\Intro\PA\scripted\announcement1.ogg]
1.9=<voice=pa,length=7.2>Напоминаем, что сегодня — День пиццы. Так что, отправляйтесь в столовую, чтобы ухватить себе горячий кусочек.

[SFX\Room\Intro\PA\scripted\announcement2.ogg]
1.85=<voice=pa,length=7.7>Помните, что безопасность — это первый шаг на пути к защищённой рабочей среде. Будьте защищены, будьте бдительны.

[SFX\Room\Intro\PA\scripted\announcement3.ogg]
2.0=<voice=pa,length=11>Напоминаем всем сотрудникам о том, что мотивационные семинары проводятся в аудитории с 17 до 18 часов по четвергам. Приходите и мотивируйтесь!

[SFX\Room\Intro\PA\scripted\announcement4.ogg]
1.95=<voice=pa,length=8.8>Не забывайте сообщать о любой подозрительной деятельности своим руководителям. Никто не освобождён от надзора. Оставайтесь настороженными и сохраняйте бдительность.

[SFX\Room\Intro\PA\scripted\announcement5.ogg]
2.0=<voice=pa,length=7.2>Чувствуете себя немного не в форме? Посещайте наш гимнастический факультет по воскресеньям, и не стесняйтесь принять участие в бадминтоне со своими коллегами по работе!

[SFX\Room\Intro\PA\scripted\announcement6.ogg]
2.0=<voice=pa,length=6.3>Чувствуете себя усталым и перегруженным на работе? Свежеприготовленный кофе продаётся в кафетерии в любое время.

[SFX\Room\Intro\PA\scripted\announcement7.ogg]
1.95=<voice=pa,length=9>В эту субботу проходит ежегодный вечер кино! В этом году, смотрите фильм 'Зона 51: Паника и ужас на глубине двух миль'.

[SFX\Room\Intro\PA\scripted\scripted1.ogg]
0=<voice=pa,length=11>Внимание, начальник службы безопасности Франклин, немедленно явитесь в камеру содержания 173.

[SFX\Room\Intro\PA\scripted\scripted2.ogg]
0=<voice=pa,length=7.6>Доктор L, пожалуйста, пройдите к контрольному пункту C камеры Строгого содержания.

[SFX\Room\Intro\PA\scripted\scripted3.ogg]
