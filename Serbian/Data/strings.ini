[Option Tooltip]
; Graphics
vsync = "Vertical sync" čeka da se zavriši trenutno osvežavanje slike pre nego što krene da računa novu sliku, sprečavajući pokavu kidanja ekrana. Ovo povezuje slike igrice i Vašeg ekrana i moze izazvati kašnjenje komandi.
antialias = "Anti-Aliasing" se koristi za ugladjivanje coškova slike pre prikazivanju da bi se uklonile odsupanja kod ivica modela.
gamma = "Gamma correction" se koristi za dobijanje dobrog svetlosnog faktora da bi se izbalansirala gamma ekrana ako igra izgleda previse tamno ili svetlo. Podešavanje na previše visoko ili nisko može prikazati svet u manjim detaljima.
texlod = "Texture LOD Bias" utiče na distancu koja je potrebna da se detalji sa teksture menjaju da bi se sprečila odstupanja od ivica. Promenite ovu opciju ako teksture trepcu ili izgladaju previse mutno.
vram = Teksture koje su skladištene u Video-RAM-u se učitavaju brze, ali takodje ima loš uticaj na kvalitet teksture.
hudoffset = "HUD offset" se koristi za pomeranje kazaljke izdržlivosti i treptaja, uključujuci i radnu povrsinu različitih predmeta na sredini ekrana. Uglavnom korisno kod ultra sirokih monitora.
fov = "Vidokrug" (FOV) je količina igre koja se prikazuje na vašem ekranu.

; Audio
musicvol = Podešava ton muzike u pozadini. Klizanjem kazaljke kroz levo će utišati svu muziku.
soundvol = Podešava ton zvučnih evekata. Klizanjem kazaljke kroz levo će utišati sve zvučne efekte.
sfxautorelease = "Odbacivanje zvuka" će odbaciti zvuk u memoriji posče 5 sekundi ako se ne koristi. Sprečava problem kod raspodele memorije.
usertrack = Omogućava korisniku da pušta svoju muziku preko kanala 1 na radiu. Ova muzika se pušta iz "SFX\Radio\UserTracks\" direktorijuma. Pritisnite "1" kad je radio izabran da bi pustili Vašu muziku.
usertrackmode = Postavlja mod puštanja korisničke muzike. "Ponavljaj" pušta muziku po abecednom redu. "Nasumično" pušta muziku po nasumičnom redu.
usertrackmode.note = Note that the random mode does not prevent previously played tracks from repeating.
usertrackscan = Proverava direktorijum korisničke muzike za nove ili obrisane muzike.

; Controls
mousesensitivty = Menja brzinu kretanja miša.
mousesmoothing = Menja količinu glatkosti miša.
binds = Konfiguracija seme kontrola tokom igre.

; Advanced
showhud = Prikaži kazaljke izdržljivosti i treptaja.
console = Omogućava korišćenje konzole. Moze se koristiti pritiskom {0} tokom igre.
console.note = Korišćenje konzole Vas sprečava u dobijanju Steam-ovih dostignuća.
speedrunmode = Prikazuje tajmer i menja kako se vreme prati tokom igre radi uklapanja sa zahtevima potrebnim za Speed run-ovanje.
numericseeds = Dozvoljava da se seme unese kao intidžer, koja se koristi na kod prvobitne generacije sveta. Ako seme nije unešeno, vreme u milisekundama od početka korišćenja računara se automatski koristi.
achpopup = Prikazuje samo iskačujuće notifikacije kada je dostignuće odključano.
launcher = Dozvoljava ponovno omogućavanje pokretača ako je bio iskljucen.
showfps = Prikazuje slike po sekundi u gornjem levom ćošku ekrana.
framelimit = Limitira slike po sekundi po kojima će se igra kretati na željeni broj.
framelimit.note = Obično 60 FPS-a ili više je poželjno. Ako primetite prevelika kočenja prilikom sa ovom pocijom, pokušajte da je smanjite na više konstantan FPS.

