[Death Message]
008 = Subjekat D-9341 je pronadjen kako konzumira Dr. [ZACRNJENO] u Sektoru [ZACRNJENO]. Subjekat je odmah eleminisan od strane Devetorepe Lisice i poslat na obdukciju. SCP-008 infekcija je utvrdjena, posle čega je telo spaljeno.
008.gate = Subjekat D-9341 je pronadjen kako luta u {0}. Subjekat je odmah eleminisan od strane Devetorepe Lisice i poslat na obdukciju. SCP-008 infekcija je utvrdjena, posle čega je telo spaljeno.
008.gate.a = Kapija A
008.gate.b = Kapija B
008zombie = Subjekat D-9341. Razlog smrti: vise posekotina i težak tup udarac od strane [INFORMACIJA IZBRISANA], koji je bio inficiran sa SCP-008. Pomenut subjekat je pronadjen od strane Devetorepe Lisice i eleminisan.
012 = Subjekat D-9341 je pronadjen u loki krvi pored SCP-012. Subjekat je izgleda pocepao sam svoje zglobove na rukama i napisao dodatne tri crte na kompoziciji pre nego sto je preminuo od manjka krvi.
035.chamber = Klasa D Subjekat D-9341 je pronadjen mrtav unutar SCP-035'eve izolacije. Subjetak prikazuje teško krvarenje iz vena oko očiju i unutar usta i nosa. Poslat na obdukciju.
035.tentacle = "Biće nam potrebno malo više nego obični čistači. Dva velika i veoma aktivna pipka, po igledu, liče da su se pojavile u ćeliji. Nivo njihove agresije je veći nego što smo do sada videli - Liči kao da su istukli nekog nesretnog iz D klase do smrti prilikom proboja."
035.tentacle.office = "Jedan veliki i veoma aktivan pipak, po izgledu, je izrastao sa spoljašnje strane na jednom mrtvom telu naučnika unutar zone kancelarija [ZACRNJENO]. Nivo njihove agresije je veći nego što smo do sada videli - Liči kao da su istukli nekog nesretnog iz D klase do smrti prilikom proboja."
049 = Aktivna pojava SCP-049-2 je pronađena u [ZACRNJENO]. Eliminisano od strane Devetorepe Lisice.
049.chamber = Tri (3) aktivne pojave SCP-049-2 su pronadjene u tunelima van SCP-049'eve karantinske ćelije. Eliminisano od strane Devetorepe Lisice.
0492 = Subjekat D-9341. Razlog smrti: vise posekotina i težak tup udarac od strane SCP-049-2.
096 = Velika količina krvi je pronađena u [INFORMACIJA IZBRISANA]. DNK indetifikuje Subjekta D-9341. Najverovatnije [INFORMACIJA IZBRISANA] od strane SCP-096.
106.pd = Subjekat D-9341. Telo delimično raspadnuto zbog, onog sto se predpostavlja da je "korozivni" efekat od SCP-106. Telo je spaljeno.
106.pd.crushed = Štaviše, pored raspadnutog tela koja su tipična za SCP-106 telo sadrži povrede koje nisu primećene ranije. Velika fraktura lobanje, tri polomljena rebra, polomljeno rame i više teških posekotina.
106.pd.fall = Štaviše, pored raspadnutog tela koja su tipična za SCP-106 telo sadrži obe polomljene noge.
173 = Subjekat D-9341. Razlog smrti: Fatalni prelom vratne kičme. Predpostavlja se da je napad SCP-173.
173.camera = Subjekat D-9341. Razlog smrti: Fatalni prelom vratne kičme. Snimci video-nadzora potvrđuju da je subjekt ubijen od strane SCP-173.
173.intro = Subjekat D-9341. Razlog smrti: Fatalni prelom vratne kičme. Prema Načelniku Sigurnosti Franklinu Security Chief Franklin koji je bio prisutan prilikom SCP-173'ovog begstva iz ćelije, subjekat je ubijen od strane SCP-173 domah pri početku elektične ometnje.
173.doors = "Ako se ne varam, osnovni razlog za pravljenjem ovih prostorija jeste da bi se sprečilo slobodno kretanje SCP-173 u slučaku proboja karantina. E pa, čija genijalna ideja je bila da stavi VENTILACIJU VELIKU KAO ČOVEK unutra?"
205 = SCP-205'ov ciklus se nastavlja normalno nakon što su uočene neke anomalije tokom [ZACRNJENO]. Telo subjekta D-9341 je pronadjeno u ćeliji. Subjekat sadrži znakove traume udarca po telu tipične za subjekte koje ulaze u ovu ćeliju kada su svetla ugašena.
420js = Subjekat D-9341 je pronađen u stanju komatoze u [INFORMACIJA IZBRISANA]. Subjekat je držao predmet koji podseća na cigaretu dok se smejao sa širokim osmehom. Hemiska analiza cigarete je prošla bez konkretnog zaključka, ali primećen je veoma koncentrisan hemiski sastav koji po molarnoj strukturi podseća na tetrahzdrocennabinol.
427 = "Zahtev podršku od DRL Br-7. Potrebno nam je više vatrene snage da oborimo ovo."
895 = "Ono što znamo jeste da je umro od srčanog udara. Predpostavljam da je delo SCP-895, do duše do sad nije primećen da ima efekat na video uređaje sa ovolike daljine. Daljna ispitivanja su potrebna da se utvrdi da li se SCP-895'ova crvena zona uticaja povećava."
895.nvg = "Klasa D je gledala SCP-895 kroz par digitalnih naočara za noćni vid, što je dovelo do smrti."
895.finenvg = "Klasa D je gledala SCP-895 kroz par digitalnih naočara za noćni vid, predpostavljeno da su iste nadograđene kroz SCP-914. Moguće je da je subjekat uspeo da delimično odbija efekte kroz ove naočare. Naočare su sačuvane za daljnje testiranje."
914.rough = "Teško osakaćeno telo je pronađeno u izlaznoj kabini SCP-914. DNK testiranje indetifikuje telo kao Klasa D Subjekat D-9341. Subjekat je očigledno bio 'nadograđen' kroz SCP-914 na 'gruboj' opciji, Ali idalje smo zbunjeni kako je uspeo da bude u ulaznoj kabini i ko ili šta je okrenulo ključ.
914.superman = Kombinezon Klase D Je pronađena u [INFORMACIJA IZBRISANA]. Nakon dubljeg ispitivanja, kombinezon je bio ispunjen sa 12.5 kilograma plave prašine nalik peplu. Hemiska analiza prašine ostaje nezaključena. Verovatno vezano sa SCP-914.
939 = "Sve četri (4) pobegle SCP-939 jedinke su pronađene i karantirane uspešno. tri (3) od ovih četri je napravilo veliki nered u Zoni Ostave 6. Čistači su poslati."
1025.cardiacarrest = "Preminuo je od srčanog udara nakon čitanja SCP-1025, to je sigurno. Da li postoji psihofizički srčani udar ili da li SCP-1025 ima neke anomalističke karakteristike za koje mi ne znamo?"
1123 = Subjekat D-9341 je upucan nakon što je pokušao da napadne člana Devetorepe lisice. Video nadzor pokazuje da je subjekat lutao približno 9 minuta pre nego što je viknuo "Otarasite se četiri štetočina" na kineskom. SCP-1123 je pronađen [ZACRNJENO] u blizini, što navodi da je subjekat imao nekakav fizički kontakt sa njom. Kako se tačno desilo da je SCP-1123 iznet iz svoje izolacione ćelije je nepoznat.
1048a = Telo prekriveno ušima je pronađeno u [ZACRNJENO]. Subjekat je predpostavljamo bio napadnut od pojave SCP-1048-A i ugušen ušima. Telo je odneto na obdukciju.
1162 = Mrtav klasa D subjekat je pronađen u karantinskoj ćeliji SCP-1162'a. Obdukcija pokazuje da je njegovo desno dušno krilo fali, što navodi na to da je subjekat imao interakcije sa SCP-1162.
1499 = Lokacija SCP-1499 je idalje nepoznata, tim izviđača je poslat da istraži prijavljene nasilničke napade na crkvu u Ruskom gradu [ZACRNJENO].
14991 = Ne indetifikovan muškarac i preminula klasa D je pronađena u [ZACRNJENO] od strane Devetorepe Lisice. Čovek je opisan kao veoma uznemiren i da priča samo ruski jezik. Prebačen je u pritvor [ZACRNJENO] dok čekamo da se pojavi prevodilac.
14991.dimension = Svo osoblje postavljeno u Evakuacionom Skloništu LC-2 tokom proboja karantina dat je amneznik klase B zbog incidenta 1499-E. Subjekat klase D koji se pronašao u ovom dešavanju je ubrzo ubijen od strane Agenta [ZACRNJENO].
guard.intro = Subjekat D-9341. Razlog smrti: Rana od metka u glavi. Video nadzorini snimci potvrđuju da je subjekat eleminisan od strane Agenta Ulgrina ubro nakon početka blokade.
guard.gate.b = "Agent G. Kontroli. Eliminisao sam Klasu D begunca u dvorištu Kapije B."
apache = "KNL-2 Kontroli. Upucao sam begunca Klase D u {0}."
apache.gate.a = Kapija A
apache.gate.b = Kapija B
ntf = Subjekat D-9341. Eleminisan od strane Devetorepe lisice.
ntf.bloodloss = Subjekat D-9341. Preminuo od gubitka krvi nakon što je bio upucan od strane Devetorepe lisice.
tesla = Subjekat D-9341 je ubijen od strane Tesla kapije u [ZACRNJENO].
killbat = Subjekat D-9341 je pronađen u izlaznoj kabini SCP-914'a pored obične baterije od devet volti. Subjekat je pronaćen prekriven teškim električnim opekotinama, i predostavlja se da je ubijen od strane električnog šoka proizveden od strane baterije. Baterija je skladištena za dalje testiranje.
suicide_1 = [ZACRNJENO]
suicide_2 = Subjekat D-9341 pronađen mrtav u Sektoru [ZACRNJENO]. Subjekat nema očiglednih fizičkih trauma, nema nikakvih vidljivih indikatora koji bi navodili na šta ga je ubilo. Telo je poslato na obdukciju.
suicide_3 = EXCP_ACCESS_VIOLATION
suicide_4 = Subjekat D-9341 pronađen mrtav u Sektoru [ZACRNJENO]. Subjekat je svojom krvi napisao "kys" kraj sebe. Nikakve ostale fizičke traume nisu primećene. Telo je poslato na obdukciju.
gassed = Subjekat D-9341 pronađen mrtav u [INFORMACIJA IZBRISANA]. Razlog smrti: Gušenje u dezinfikacionom gasu.

