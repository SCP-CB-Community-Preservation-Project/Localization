[Mobilna Taktička Jedinica]
image path = mtf.jpg
align x = center
align y = center
text1 = DRL su mali timovi (u glavnom od deset do dvadeset operatora, iako grupe preko 50 ljudi nisu neobične) Oni se specijališu za spicifične pozicije ili dojave sa specifične situacije.
text2 = Mobilna Taktička Jedinica E-11 ("Devetorepa Lisica") je intenzivno trenirana Taktiča jedinica koja je specijalizovana za odbranu i rekarantiranje SCP objekata koji se čuvaju na Sajtu-[INFORMACIJA IZBRISANA].
text3 = Njihovi zadaci se sastoje od rekarantiranja svih aktivnih, agresivnih SCP kao i spašavanje preživelog osoblja fundacije i eliminisanje bilo kojih begunaca Klase D.

[Naočare za noćni vid]
image path = NVG.jpg
align x = right
align y = top
disablebackground = true
text1 = Standardno izdanje naočara za noćni vid davane jedinkama DRL u slučajevima elektičnog pomračenja.
text2 = Naučnici su takođe opremljeni sa istim, ali se preporučuje fokus na evakuaciju u slučaju pomračenja.

[SCP-012]
image path = 012.jpg
align x = right
align y = top
disablebackground = true
text1 = SCP-012 je pronađen od strane Arheologa K.M. Sandovala tokom iskopa grobnice u severnom delu Italije. Predmet, parče ručno napisane muzičkog dela pod imenom "Na Golgoti", izgleda da nije završeno.
text2 = Crveno-Crno mastilo, prva pomisao je da je napravljeno od neke bobice ili nekog prirodnog mastila, posle je utvrđeno da je ljudska krv sa nekoliko subjekata.
text3 = Više test subjekata je dobilo dozvolu pristupa delu. U svim slučajevima subjekti su se samo osakatili kako bi iz sebe uzvukli krv kako bi dovršavali delo, have been allowed access to the score. In every case, the subjects mutilated themselves in order to use their own blood to finish the piece, dovodeći do nakadnih simptoma psihoze i masivne traume. 

[SCP-035]
image path = 035.jpg
align x = right
align y = top
disablebackground = true
text1 = SCP-035 izgleda kao srećna dramska maska, ali povremeno, se menja u tužnu dramsku masku.
text2 = Kad se SCP-035 stavi na lice osobe, alternativni moždani talasi zamenjuju one od domaćina, praktično utišavajući ga i daje moždanu smrt subjektu. Subjekat tada tvrdi da ima svest iz SCP-035.
text3 = Psihološka analiza je odkrila da SCP-035 ima istaknutu manipulatorsku prirodu, sposobnu da nadmetne iznenadne i izrazite promene psihe istraživača. SCP-035 iskazuje sadističke tendencije, terajući ljude da izvrše samoubistvo koristeći samo lingvističko ubeđivanje.

[SCP-049]
image path = 049.jpg
align x = left
align y = center
disablebackground = true
text1 = SCP-049 ima izgled čoveka; nažalost, Fundacija trenutno nije u mogućnosti da prouči lice ili telo u potpunosti, zato što je prekriveno odećom tradicionalnog Evropskog doktora kuge iz 15tog-16tog veka.
text2 = SCP-049'ov dodir je smrtonosan po čoveka. Nakon kontakta sa SCP-049'ovim rukom/rukama, žrtva (daljne nazvani SCP-049-2) doživljava [INFORMACIJA OBRISANA] i umire istog momenta.
text3 = SCP-049 stvara torbicu koja je napravljena od [INFORMACIJA OBRISANA] koja sadrži skalpele, igle, konce, i nekoliko bočica sa neindetifikovanim tečnostima i počinje da secirati SCP-049-2, kao i ubacivati različite tečnosti u telo. 
text4 = Nakon otprilike 20 minuta, SCP-049 zašiva SCP-049-2 koji onda postaje poslušan. Posle perioda od par minuta, SCP-049-2 pokazuje znake života i izgledom se vraća u život.

[SCP-066]
image path = 066.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-066 je bezoblična masa zamršene niti, težine približno jednog kilograma.
text2 = Nakon incidenta sa 066-2 (pogledajate raport incidenta 066-2), SCP-066 kreće da pokazuje haotična ponašanja u poređenju sa bivšim.
text3 = SCP-066 sada pokazuje značajnu mogućnost kretanja. Može proizvesti note i anomalije u prisustvu čoveka, nebitno da li je čovek imao interakcije sa SCP-066.

[SCP-079]
image path = 079.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-079 je Exidy Sorcerer microcompjuter napravljen 1978. 
text2 = Nije poznato kada je SCP-079 stekao svest, ali je poznato da je njegov softver evoluirao toliko da njegov hardver ne bi trebao da pordži, čak ni u fantaziji.
text3 = Uspeo je da prođe Turing test, i veoma je pričljiv, ali poprilično drzak u svom tonu. Takođe iskazuje veliku želju za begstvom.

[SCP-096]
image path = 096.png
align x = right
align y = bottom
disablebackground = true
text1 = SCP-096 je u glavnom poslušan, senzori dodira navode na to da on provodi većinu dana hodajući na istočnoj strani svoje ćelije.
text2 = Međutim, kada neko pogleda u SCP-096'ovo lice, čak i preko video snimka, ili čak i fotografije, on ulazi u stanje znatne emocionalne patnje.
text3 = Približno posle jednog ili dva minuta nakon ugledanja, SCP-096 počinje trćati ka osobi koja je videla njegovo lice.

[SCP-106]
image path = 106.jpg
align x = right
align y = bottom
text1 = SCP-106 izgleda kao sariji čovek, u dubokoj fazi raspada. Njegov lik se menja, ali njegov "raspad" je uočen u svim formama.
text2 = SCP-106 navodi na "koroziju" bilo kog čvrstog materijala koji dođe u kontakt sa njim, i započinje fizički raspad nekoliko sekundi nakon kontakta. Zapaženženi su procesi ržđe, buđi i pucanje materijala, i stvaranje crne, ljigave substance približne onom kojom je prekriven SCP-106.
text3 = SCP-106 može prolaziti kroz čvrste materije i hvata i ubija svoju žrtvu tako što ih uvlači u nešto što se predpostavlja da je "Džepna dimenzija".

[SCP-173]
image path = 173.jpg
align x = left
align y = bottom
text1 = SCP-173 je sastavljen od cementa i armature sa tragovima Krylon sprej boje. Živo je i veoma agresivno.
text2 = Predmet se ne može kretati dok se posmatra. Pogled sa ne sme biti prekinut sa SCP-173. Osoblje koje izabrano da ulazak u ćeliju su upućeni da moraju da najave svoje treptaje.

[SCP-205]
image path = 205.jpg
align x = right
align y = bottom
disablebackground = true
text1 = SCP-205 je par reflektora koji se koriste u fotografiji. Svetlo emitovano od svake lampe se ponaša posebno za SCP-205 i svetlost probija kroz bilo koju površinu koja nije ofarbana belom bojom.
text2 =  Ako svetlo nastavi neometano da prolazi kroz bilo koju materiju, međutim nabacajući senku, svaka lampa će pokazivati neidetifikovanu mladu ženu na ravnu površinu, kao na ekranu za projekcije u Ćeliji 52.

[SCP-294]
image path = 294.jpg
align x = center
align y = bottom
disablebackground = true
text1 = Predmet SCP-294 liči na standardnu kafe mašinu, jedina primetna razlika je ulazni ekran koja se poklapa sa Engleskom QWERTY tastaturom.
text2 = Nakon unošenja bilo koje tečnosti preko ekrana, standardna papirna čaša od 350ml je napunjena sa zadatom tečnošću.
text3 = Devedeset i sedam prvobitnih testiranja zahtevima (koja su uključivala zahteve za vodu, kafu, pivo, i sokove, takođe i tečnosti koje nisu za piće, sulfurne kiseline, tečnost za stakla, motorna ulja, subtance koje se u prirodi uglavnom ne nalaze u tečnim stanjima, gvožđe i staklo) od kojih je svaki izvršen.

[SCP-372]
image path = 372.jpg
align x = left
align y = bottom
disablebackground = true
text1 = SCP-372 je stvorenje nepoznatog roda, otprilike 2m u dužini od glave do repa i težine približnoj 50kg. Ima dugačko, tanko telo sa osam pari uskih nožica.
text2 = SCP-372 je naučilo da predvidi pokrete bilo kog živog bića oko sebe, ono koristi ovu tehniku da se sakrije iza glave osobe koje je posmatra, ili u bilo koju tačku van vidokruga.
text3 = U slučaju proboja karantina, svo osoblje je naloženo da prijavi bilo kakvo treptanje u ćoškovima njihovog vidokruga.

[SCP-427]
image path = 427.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-427 je malo, okruglo, bogato izrezbaren medaljon napravljen od uglačanog srebrnog materijala. Ukrašeni urezi liče kao da nemaju korist.
text2 = SCP-427 je napravljen nakon ubacivanja kapsule od SCP-500 u ulaznu komoru SCP-914 i korišćenje komande Fino. Ne prikazuje nikakve čudne aktivnosti kada je zatvoren. Kada je SCP-427 otvoren i izložen biološkom tkivu, ubrzano regeneriše oštećene ćelije i nekako ima sposobnost izbacivanja stranih tela i infekcija.
text3 = Međutim, dugo izloženje se može pokazati opasno po život. Tokom lečenja, optimizuje sistem tela. Osoblje Klase D koja je bila izložena medaljonu preko jednog sata, počela je da mutirar u bezobličenu masu tkiva.
text4 = "Mesnata Čudovišta" naravljena od SCP-427 su veoma agresivna, napadajući svo osoblje sa smrtnim rezultatima. Veoma su otporni na većinu poznatih oružija.

[SCP-500]
image path = 500.jpg
align x = right
align y = bottom
text1 = SCP-500 je mala plastična bočica koja za vreme pisanja ima četrdeset i sedam (47) crvenih tableta.
text2 = Jedna tableta, je uzeta oralnim putem, efektivno leči subjekta od svih bolesti za dva sata, tačno vreme potrebno zavisi od subjektovog stanja.
text3 = Uprkos dugih prokušaja, svi pokušaji u rekonstukciji još onoga što se smatra aktivnim sastojkom tablete nije bilo uspešno.

[SCP-513]
image path = 513.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-513 je nalik obično, rđavo zvono za krave. Nema nikakvih ureza ili ogrebotina koji se mogu uočiti zbog silne rđi.
text2 = Nakon otprilike jednog sata izloženi SCP-513, počinju ugledati tračke bića kome je dodeljeno ime SCP-513-1.
text3 = Sva ispitivanja do sad navode da je SCP-513-1 visoko, mrtvo biće nalik čoveku sa šakama abnormalne veličine.

[SCP-682]
image path = 682.jpg
align x = right
align y = bottom
text1 = SCP-682 je veliko stvorenje, nalik gmizavcu nepoznatog porekla. Izgleda da gaji mržnju prema svim zivim bićima, sto je bilo iskazano tokom nekoliko ispitivanja u karantinu.
text2 = SCP-682 je uvek očen da poseduje veliku snagu, brzinu i brze reflekse, ali tačni nivoi zavise od njegove forme. SCP-682'eva moć regenerisanja je zastrašujuća, uočen je kako se kreće i priča sa 87% svoga tela uništeno ili raspalo.
text3 = SCP-682 mora biti uništen prvom prilikom.

[SCP-714]
image path = 714.jpg
align x = center
align y = center
disablebackground = true
text1 = Izgleda ne više od ogrebanog zelenog prstena, SCP-714 je pokazalo sposobnost da se raširi ili skupi kako bi odgovarao prstu od onoga ko ga nosi, ali ovo je možda i najnebitnija sposobnost. 
text2 = Tokom nošnje SCP-714 dobijamo više efekata, koji uključuju iscrpljenost, nagon za spavanje/odmor, sporije reakcije i smanjene mentalne sposobnosti.
text3 = Nosioci SCP-714 pokazuju povećanu otpornost na razne hemikalije i abnormalno veliku otpornost a mimčne i mentalne uticaje.

[SCP-860]
image path = 860.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-860 je tamno plavi klić običnog oblika.
text2 = U nasumičnim intervalima u vremenu, red brojeva se pojavljuje po dužini ključa. Posle jepronađeno da su ti brojevi UTM koordinate.
text3 = SCP-860 može ući i odključati bilo koju tradicionalnu bravu koja se nalazi u blizini datih koordinata.
text4 = Kad SCP-860 odključa i otvori vrata, vrata ne vode na običnu destinaciju. Naprotiv, vode ka malom delu krčene šume koji je dalje nazvan SCP-860-1.

[SCP-895]
image path = 895.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-895 je ukrašen hrastov kovčeg pronađen porgebnici [ZACRNJENO].
text2 = SCP-895 pravi smetnje u video u foto nadzorom u okviru od 50 metara sa živopisnim, uznemiravajućim halucinacijama sa različitim periodama u zavisnosti od blizine aparata od SCP-895. 
text3 = Unutar okvira od 5 metara od SCP-895, usnimljeni snimci mogu prouzrokovati teške psihičke traume i histerije kod većine subjekata.

[SCP-914]
image path = 914.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-914 je veliki mehanizam na navijanje koji teži nekoliko tona i prekriva površinu od osamnaest kvadrata, koji sadrži šrafcigere, kajševe, tegljača, zubčanika, federa i ostalih delova na navijanje.
text2 = Kada je predmet postavljen u ulaznu komoru i ključ navijen, SCP-914 će "usafršiti" objekat. Nikakva energija nije potrošena u procesu, objekat je usavršen u odnosu na podešavanje koje je izabrano na kontrolnoj tabli 914'a.
text3 = Zabranjen je unos organskih materija u SCP-914.

[SCP-939]
image path = 939.jpg
align x = left
align y = top
disablebackground = true
text1 = SCP-939 su endotermni, čoporativni predatori koji pokazuju atrofiju različitih sistem slična troboličkim organizmima. SCP-939 su u proseku 2.2 metera visine kada stoje uspravno i teže u proseku 250kg, ali težina je veoma promenljiva.
text2 = SCP-939'va primarna metoda mamljenja žrtve jeste imitacija ljudskog govora u glasu bivše žrtve, imitacija drugih stvorenja i aktivan noćni lov je takođe uočen.
text3 = Žrtva je uglavnom ubijena sa jednim ugrizom lobanje ili vrata; Ugrizna moć je izmerena kao veća od 35MPa.


[SCP-966]
image path = 966.jpg
align x = left
align y = bottom
disablebackground = true
text1 = SCP-966 su vidljivi samo na talasnim dužinama od 700nm do približno 900nm. Ovo je tačno za sva SCP-966'va tkiva, nebitno od njihobog trenutnog stanja.
text2 = Njihove metode lova se sastoji od emitovanja jednog praska, nama pre nepoznatog talasa, koji večito sprečavaju pogođeno stvorenje da ulazi u NREM i REM delove sna. Takođe, sposobnost mikro spavanja je izgubljena.
text3 = Nakon lišavanja sna žrtve, SCP-966 će uhoditi žrtvu dok žrtva neosposobi zbog manjka sna. Nakon toga SCP-966 konzumira žrtvu.


[SCP-970]
image path = 970.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-970 je prostorni fenomen gde se kolekcija prostorija ponavlja među sobom. U svim slučajevima, redovi vrata se pojavljuju na zidovima u ravnoj liniji, prilikom hodanja pravo kroz vrata subjekat će se uvek vratiti na početnu tačku.
text2 = Menjanja kroz sobe nema efekat na komšiske sobe ili spratove. Trenutno nema objanjenja kako ovaj fenomen radi.
text3 = Nakon prvog pronalaska SCP-970 fenomena, pronađeno je još ovakvih primeraka, od kojih je [INFORMACIJA OBRISANA]% unutar Sajta 19.

[SCP-1025]
image path = 1025.jpg
align x = right
align y = bottom
text1 = SCP-1025 je knjiga sa čvrstim koricama, otprilike 1500 stanica duga. Na naslovnoj strani i kičmenom delu knige stoji naslov "Enciklopedija uobičajnih bolesti".
text2 = Nije pronađena nijedna kopija knjige sa istim naslovom i izdavačem, čak nepostoji ni dokaz da izdavač posotji.
text3 = Čitaoci dobijaju bolest o kojoj su pročitali u knjizi. Ovaj efekat može da se desi posle _ i __ sata.

[SCP-1123]
image path = 1123.jpg
align x = center
align y = center
disablebackground = true 
text1 = SCP-1123 je ljudksa lobanja kojoj fali vilica i njeni zubi. Preko spoljašnje površine frontalne kosti ispisano je savremenim kmerskim pismom, ljudskom krvlju, "Zapamti".
text2 = Genetsko testiranje potvrđuje da je lobanja i krv od iste osobe. Kmersko pismo je poprilično izbledelo, čak ne vidljivo za subjekte preko daljine od 5 metara.
text3 = Subjekti koji su bili na rastojanju od 1 metar ili bliže privaljuju da je krv sveža, "idalje mokra", kao i druge anomalije sa njhovim receptorima, koji uključuju miris, zvuk i dodir.

[SCP-1162]
image path = 1162.jpg
align x = center
align y = center
disablebackground = true 
text1 = SCP-1162 je trenutno rupa u betonskom zidu na Sajtu-[INFORMACIJA OBRISANA].
text2 = SCP-1162 je aktivirana kada svesno biđe ubaci ruku unutar rupe, nakon čega prsti osećaju čvrstu površinu koja podseća na onu na kojoj se SCP-1162 nalazi, potom se pronalazi mali predmet koji može stati unutar rupe.
text3 = Ovi predmeti su univerzalno smatrani nečim što je korisnik izgubio ili u jednom momentu svoga života tražio.

[SCP-1499]
image path = 1499.jpg
align x = right
align y = bottom
disablebackground = true 
text1 = SCP-1499 je Sovjetska GP-5 gas maska. Testiranje dihtunga predmeta navodi na to da prdmet idalje vrši svoju originalnu funkciju.
text2 = Anomalični efekti su aktivni kada se SCP-1499 postavi na glavu čoveka. Nakon otprilike jedne sekunde SCP-1499 se potpuno veže sa subjektovu glavu, subjekat nestaje iz vida i nije moguće detektovati ga.
text3 = Nakon korišćenja SCP-1499, subjekti prijavljuju kompletno drugačije okruženje u odnosu na ono pre nego što je maska SCP-1499 stavljena.

[Pobunjenički Haos]
image path = chaos.jpg
align x = left
align y = bottom
disablebackground = true
text1 = Pobunjenički Haos je odcepljena grupa Fundacije, stvorena od strane odmetničke ćelije koja je 1924. godine dezertirala sa nekoliko izuzetno korisnih SCP-ova.
text2 = Glavna baza operacija pobude je nepoznata, kao i njihovi predvodioci. Ova organizacija je direktno neprijateljski nastrojena prema Fundaciji, pravivši sukobe oko SCP'va nekoliko puta. 
text3 = Osoblje je upozoreno na moguđe pljačke, terrorističke napade, i špiune, i potrebno je da prijave bilo kakva čudna ponašanja svojih saradnika komandi.

[Osoblje Klase D]
image path = classd.jpg
align x = right
align y = bottom
text1 = Osoblje Klase D namenjen za rukovanje predmetima nivoa Keter.
text2 = Osoblje Klase D su regrutovani zatvorenici. Teško osuđeni su poželjni; u vremenima prinude, Protokol 12 dozvoljava regrutovanje nedužnih ili onih zatvorenih sa lakšim krivičnim delima.
text3 = Svo Osoblje Klase D je eliminisano svakog prvog dana u mesecu, i nova tura osoblja mora biti spremna da ih zameni.

