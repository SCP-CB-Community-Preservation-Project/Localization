[Death Message]
008 = Obiekt D-9341 został znaleziony podczas spożywania Dr. [USUNIĘTO] w Sectorze [USNIĘTO]. Obiekt został natychmiastowo unieszkodliwiony przez Nine-Tailed Fox i wysłany na autopsje. Infekcja SCP-007 potwierdzona. Ciało zostało spalone.
008.gate = Obiekt D-9341 został znaleziony błąkający się po okolicy {0}. Obiekt został natychmiast unieszkodliwiony przez Nine-Tailed Fox i wysłany na autopsję. Potwierdzono zakażenie SCP-008, ciało zostało spalone.
008.gate.a = Bramy A
008.gate.b = Bramy B
008zombie = Obiekt D-9341. Powód śmierci: wiele ran szarpanych i poważne tępe urazy spowodowane przez [ZMIENIONO], który był zainfekowany przez SCP-008. Wspomniany obiekt został odnaleziony i unieszkodliwiony przez agenta Nine-tailed Fox.
012 = Obiekt D-9341 został znaleziony w kałuży krwi obok SCP-012. Wygląda na to, że podmiot rozerwał jeden ze swych nadgarstków, i dopisał trzy dodatkowe wiersze do kompozycji, zanim zmarł od utraty krwi.
035.chamber = Klasa D Obiekt D-9341 znaleziona martwa w przechowalni SCP-035. U podmiotu występują silne krwotoki z naczyń krwionośnych wokół oczu oraz wewnątrz jamy ustnej i nosa. Wysłano na autopsję.
035.tentacle = "Będziemy potrzebować czegoś więcej niż tylko standardowej ekipy sprzątającej, żeby się tym zająć. W komorze najwyraźniej uformowały się dwa duże i niezwykle aktywne, przypominające macki wyrostki. Ich poziom agresji jest nieporównywalny z niczym, co widzieliśmy wcześniej – wygląda na to, że w pewnym momencie włamania zatłukli na śmierć jakiegoś nieszczęsnego członka Klasy D".
035.tentacle.office = "Jeden duży i niezwykle aktywny, przypominający mackę wyrostek najwyraźniej wyrósł poza ciałem naukowca w pomieszczeniu biurowym [ZMIENIONO]. Jego poziom agresji nie przypomina niczego, co widzieliśmy wcześniej. Wygląda na to, że podczas incydentu zatłukł na śmierć jakiegoś nieszczęsnego pracownika klasy D".
049 = Aktywna instancja SCP-049-2 została znaleziona w [ZMIENIONO]. Unieszkodliwiona przez agenta Nine-Tailed Fox.
049.chamber = Trzy (3) aktywne instancje SCP-049-2 znalezione w tunelu poza przechowalnią SCP-049. Unieszkodliwione przez agenta Nine-Tailed Fox.
0492 = Obiekt D-9341. Powód śmierci: wiele ran szarpanych i poważne tępe urazy spowodowane przez instancje SCP-049-2.
096 = Duża ilość krwi znaleziona w [ZMIENIONO]. DNA zidentyfikowane jako Obiekt D-9341. Prawdopodobnie [ZMIENIONO] przez SCP-096.
106.pd = Obiekt D-9341. Ciało częściowo rozłożone przez, co jest zakładane, efekt "korozji" SCP-106. Ciało usunięte poprzez spalenie.
106.pd.crushed = Poza rozłożonym wyglądem typowym dla ofiar SCP-106, ciało nosi ślady obrażeń, których nigdy wcześniej nie obserwowano: masywne pęknięcie czaszki, trzy złamane żebra, złamane ramię i liczne, poważne rany szarpane.
106.pd.fall = Oprócz rozłożonego wyglądu, typowego dla ofiar SCP-106, obiekt najwyraźniej doznał licznych, poważnych złamań obu nóg.
173 = Obiekt D-9341. Powód śmierci: Śmiertelne złamanie szyjne. Prawdopodobnie zaatakowany przez SCP-173.
173.camera = Obiekt D-9341. Powód śmierci: Śmiertelne złamanie szyjne. Taśmy z monitoringu potwierdzają że podmiot został zabity przez SCP-173.
173.intro = Obiekt D-9341. Powód śmierci: Śmiertelne złamanie szyjne. Według Szefa Ochrony Franklina, który był obecny w przechowalni SCP-173 podczas naruszenia zabezpieczenia, podmiot został zabity przez SCP-173 zaraz po zaczęciu się zakłóceń w sieci energetycznej.
173.doors = "Jeśli się nie mylę, jednym z głównych celów tych pomieszczeń było zatrzymanie SCP-173 przed posuwaniem się dalej w świetle przełamania zabezpieczeń. Więc, kto wpadł na świetny pomysł, żeby tu zainstalować PIEPRZONY SZYB WENTYLACYJNY TAK DUŻY ŻE PRZECISNĄŁBY SIĘ PRZEZ NIEGO DOROSŁY CZŁOWIEK?"
205 = Wydaje się, że cykl SCP-205 wznowił swój normalny przebieg po anomaliach zaobserwowanych podczas [ZMIENIONO]. Wewnątrz przechowalni odkryto ciało obiektu D-9341. Obiekt wykazuje oznaki urazu tępym narzędziem typowe dla personelu, który wszedł do przechowalni, gdy światła są wyłączone.
420js = Obiekt D-9341 znaleziony w stanie śpiączki w [ZMIENIONO]. Osoba ta trzymała w ręku coś, co wyglądało na papierosa, i szeroko się uśmiechała. Analiza chemiczna papierosa nie dała jednoznacznych wyników, chociaż wydaje się, że zawiera on wysokie stężenie niezidentyfikowanej substancji chemicznej, której struktura molekularna jest zadziwiająco podobna do tetrahydrokannabinolu.
427 = "Proszę o wsparcie MTF Nu-7. Potrzebujemy większej siły ognia, żeby go załatwić".
895 = "Wiemy, że zmarł na zawał serca. Myślę, że zostało to spowodowane przez SCP-895, chociaż nigdy wcześniej nie zaobserwowano, żeby miał wpływ na sprzęt wideo z takiej odległości. Dalsze testy są konieczne w celu ustalenia czy 'Czerwona Strefa' SCP-895 się powiększa."
895.nvg = "Tester Klasy D obejrzał SCP-895 przez parę cyfrowych gogli noktowizyjnych, zabijając go."
895.finenvg = "Tester Klasy D obejrzał SCP-895 przez parę cyfrowych gogli noktowizyjnych, prawdopodobnie ulepszonych przez SCP-914. Możliwym może być, że podmiot mógł częściowo oprzeć się efektom memetycznym przez te gogle. Gogle zostały przechowane do dalszych badań."
914.rough = "Poważnie okaleczone zwłoki znalezione w kabinie wyjściowej SCP-914. Testy DNA zidentyfikowały zwłoki jako testera D-9341. Podmiot został oczywiście 'udoskonalony' przez SCP-914 na ustawieniu 'Prymitywny', ale nadal nie mamy bladego pojęcia jak znalazł się w kabinie wejściowej i kto lub co nakręciło klucz."
914.superman = Strój klasy D znaleziony w [ZMIENIONO]. Po dalszych badaniach stwierdzono, że kombinezon jest wypełniony 12,5 kilograma niebieskiej substancji przypominającej popiół. Analiza chemiczna substancji pozostaje niejednoznaczna. Najprawdopodobniej związana z SCP-914.
939 = "Wszystkie cztery (4) uciekłe instancje SCP-939 zostały złapane i pomyślnie zabezpieczone. Trzy (3) z nich zrobiły niezły bałagan w Strefie Magazynowej 6. Wysłano ekipę sprzątającą."
1025.cardiacarrest = "Zmarł na zatrzymanie akcji serca po przeczytaniu SCP-1025, to jest pewne. Czy istnieje coś takiego jak psychosomatyczne zatrzymanie serca, czy też SCP-1025 ma jakieś anomalne właściwości, o których jeszcze nie wiemy?"
1123 = Obiekt D-9341 został zastrzelony po próbie zaatakowania członka Nine-Tailed Fox. Z taśm monitoringu wynika, że obiekt błąkał się po terenie około 9 minut wcześniej, krzycząc po chińsku 'pozbyć się czterech szkodników'. SCP-1123 został znaleziony w [ZMIENIONO] w pobliżu, co sugeruje, że podmiot miał z nim kontakt fizyczny.
1048a = Zwłoki pokryte uszami zostały znalezione w [ZMIENIONO]. Podmiot prawdopodobnie został zaatakowany przez instancję SCP-1048-A i został uduszony na śmierć przez uszy. Ciało zostało wysłane na autopsję.
1162 = Zmarły członek personelu klasy D został znaleziony w przechowalni SCP-1162. Autopsja wykazała, że brakowało jego prawego płuca, co sugeruje interakcję z SCP-1162.
1499 = Miejsce pobytu SCP-1499 jest nadal nieznane, ale wysłano zespół zwiadowczy w celu zbadania raportów o brutalnym ataku na kościół w rosyjskim mieście [ZMIENIONO].
14991 = Niezidentyfikowany mężczyzna i martwy obiekt Klasy D zostali znalezieni w [ZMIENIONO] przez Nine-Tailed Fox. Mężczyzna był opisywany jako wysoce skołowany i zdawał się mówić tylko po rosyjsku. Został on zabrany do chwilowej strefy przetrzymania w [ZMIENIONO] czekając na przybycie tłumacza.
14991.dimension = Cały personel znajdujący się w obrębie Schronu Ewakuacyjnego LC-2 podczas przełamania zostali poddani amnestyką Klasy B z powodu na Incydent 1499-E. Podmiot Klasy D zaangażowany w wydarzeniu zmarł krótko po postrzeleniu przez Agenta [ZMIENIONO].
guard.intro = Obiekt D-9341. Powód śmierci: strzał w głowę. Nagrania z kamer potwierdzają że podmiot został unieszkodliwiony przez Agenta Ulgrina krótko po zainicjowaniu izolacji placówki.
guard.gate.b = "Agent G. do centrali. Zlikwidowano uciekiniera Klasy D w dziedzińcu Bramy B."
apache = "CH-2 do centrali. Zestrzeliłem uciekiniera Klasy D przy {0}."
apache.gate.a = Bramie A
apache.gate.b = Bramie B
ntf = Obiekt D-9341. Unieszkodliwiony przez agenta Nine-Tailed Fox.
ntf.bloodloss = Obiekt D-9341. Wykrwawił się po postrzeleniu przez agenta Nine-Tailed Fox.
tesla = Obiekt D-9341 zabity przez Bramę Tesli w [ZMIENIONO].
killbat = Obiekt D-9341 znaleziony martwy w kabinie wyjściowej SCP-914, obok czegoś, co wygląda na zwykłą baterię dziewięciowoltową. Obiekt doznał poważnych poparzeń elektrycznych więc przypuszcza się, że zginął w wyniku porażenia prądem elektrycznym spowodowanym przez baterię. Bateria została przechowana do dalszych badań.
suicide_1 = [USUNIĘTO]
suicide_2 = Obiekt D-9341 znaleziony martwy w sektorze [ZMIENIONO]. Wygląda na to, że podmiot nie odniósł żadnych obrażeń fizycznych i nie ma widocznych oznak tego, co go zabiło. Ciało zostało wysłane na autopsję.
