[SFX\Room\Intro\PA\scripted\announcement1.ogg]
1.9=<voice=pa,length=7.2>Nie zapominaj, że dziś jest dzień pizzy. Więc wpadnij do stołówki po gorący kawałek.

[SFX\Room\Intro\PA\scripted\announcement2.ogg]
1.85=<voice=pa,length=7.7>Pamiętaj, czujność to pierwszy krok do bezpiecznego miejsca pracy. Dbaj o bezpieczeństwo. Bądź czujny.

[SFX\Room\Intro\PA\scripted\announcement3.ogg]
2.0=<voice=pa,length=11>Przypomnienie dla całego personelu, seminarium motywacyjny odbywają się w czwartki w audytorium wydziałow w godzinach 17-18. Wpadnijcie i dajcie się zmotywować.

[SFX\Room\Intro\PA\scripted\announcement4.ogg]
1.95=<voice=pa,length=8.8>Pamiętaj by zgłaszać wszelką podejrzaną aktywność swoim przełożonym. Nikt nie jest poza kontrolą. Nawet ty. Bądź paranoiczny. Bądź czujny.

[SFX\Room\Intro\PA\scripted\announcement5.ogg]
2.0=<voice=pa,length=7.2>Czujesz, że wyszedłeś z formy? Wpadnij do siłowni wydziałowej i weź udział we wspólnej grze w badmintona w każdą niedziele.

[SFX\Room\Intro\PA\scripted\announcement6.ogg]
2.0=<voice=pa,length=6.3>Czujesz się zmęczony i przepracowany? Świeża parzona kawa jest dostępna w stołówce przez cały czas.

[SFX\Room\Intro\PA\scripted\announcement7.ogg]
1.95=<voice=pa,length=9>Wpadnij na coroczny wieczór filmowy już w tę sobotę. Tegoroczny seans: "Strefa 51 – Panika i Terror: Dwie Mile Pod Ziemią".

