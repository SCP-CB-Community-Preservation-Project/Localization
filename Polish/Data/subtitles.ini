[SFX\Room\Intro\Guard\Ulgrin\BeforeDoorOpen.ogg]
3.7=<voice=ulgrin,length=6>Centrala, melduje się Agent Ulgrin. Proszę o otwarcie celi 3-11.
8.9=<r=128,g=128,b=128>[z radia] Przyjąłem.

[SFX\Room\Intro\Guard\Ulgrin\ExitCell.ogg]
1.37=<voice=ulgrin>Hej, mamy dla ciebie robotę. A teraz zrób mi przysługę i wyjdź ze swojej celi.

[SFX\Room\Intro\Guard\Ulgrin\ExitCellRefuse1.ogg]
0=<voice=ulgrin,length=6>Co ty? Głupi, czy co? Powiedziałem, że jest robota do zrobienia. Jeśli zaraz nie wyleziesz z celi, skopię ci dupę.

[SFX\Room\Intro\Guard\Ulgrin\ExitCellRefuse2.ogg]
0=<voice=ulgrin,length=5.5>Słuchaj kolego, nie mam całego dnia. Staram się być uprzejmy. Jeśli nie wyleziesz z celi, skopię ci dupę.

[SFX\Room\Intro\Guard\Ulgrin\CellGas1.ogg]
0=<voice=ulgrin,caption=true>*heh*
0.6=<voice=ulgrin,length=6.5>Chyba jesteś najgłupszym testerem jakiego kiedykolwiek tu mieliśmy! No cóż... Zamknijcie drzwi i wpuście gaz.

[SFX\Room\Intro\Guard\Ulgrin\CellGas2.ogg]
0=<voice=ulgrin,length=5.7>Huh. Jestem trochę rozczarowany, że nie podjąłeś rękawicy. Miałem nadzieję, że będę mógł cię pobić.

[SFX\Room\Intro\Guard\Ulgrin\Escort1.ogg]
0=<voice=ulgrin,length=7.5>Po prostu idź za mną. A, i przy okazji dostaliśmy zezwolenie na zabicie każdego nieposłusznego obiektu destowego, więc nie próbuj niczego głupiego. 

[SFX\Room\Intro\Guard\Ulgrin\Escort2.ogg]
0=<voice=ulgrin,length=10>A, i przy okazji, dostaliśmy zezwolenie na yy... eksterminację każdego nieposłusznego obiektu testowego, więc polecam nie robić niczego głupiego.

[SFX\Room\Intro\Guard\Ulgrin\EscortRun.ogg]
0=<voice=ulgrin,length=4.3>Ej, debilu! Idziesz w złą stronę! Wracaj tu do cholery!

[SFX\Room\Intro\Guard\Ulgrin\EscortRefuse1.ogg]
0=<voice=ulgrin>No, pospiesz się. Czekają na ciebie.

[SFX\Room\Intro\Guard\Ulgrin\EscortRefuse2.ogg]
0=<voice=ulgrin>Słuchaj kolego, ja i tak już nienawidzę swojej roboty, więc czemu mi ją jeszcze utrudniasz?

[SFX\Room\Intro\Guard\Ulgrin\EscortPissedOff1.ogg]
0=<voice=ulgrin,length=5.5>Nie jestem w humorze na gierki. To dla mnie bez różnicy czy wpakuję ci kulę między oczy. Zacznij współpracować!

[SFX\Room\Intro\Guard\Ulgrin\EscortPissedOff2.ogg]
0=<voice=ulgrin,length=5.5>Nie jestem w humorze na gierki. Wpakuję ci kulkę między oczy, jeśli nie zaczniesz współpracować.

[SFX\Room\Intro\Guard\Ulgrin\EscortKill1.ogg]
0=<voice=ulgrin,length=3.8>No dobra, poddaję się. Teraz po prostu weźmiemy kogoś innego.

[SFX\Room\Intro\Guard\Ulgrin\EscortKill2.ogg]
