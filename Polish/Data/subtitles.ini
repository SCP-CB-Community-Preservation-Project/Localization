; [PATH\TO\SOUND\EFFECT]
; italic=true ; All subtitle lines in this section will now have italics unless overwritten by inline settings.
; 0=This text appears as soon as the sound plays.
; 2.3=This text appears 2.3 seconds after the sound first plays.
; 3.3=<voice=classd,bold=true,caption=true>This text appears after 3.3 seconds. It uses the Class D voice color, it's in bold and only appears if closed captioning is enabled.
; 3.8=<italic=false>This line overrides the italic rule written at the beginning, and is displayed normally. All the other lines will still be displayed in italics.
; 4.0=<r=0,g=255,b=0,length=10>This line of text should be green, it remains displayed on screen for at least 10 seconds.
;
; Available settings
; length=(time in seconds) - REQUIRED if the spoken subtitle is longer than 5 seconds, otherwise this subtitle will disappear before the audio is finished.
; voice=(voice name) - Copies settings from a voice definition in voices.ini
; name=(character name) - Specifies the name of the character speaking this subtitle.
; r, g, b=(a number from 0-255) - Specifies the color of this subtitle's text
; bold, italic=(true/false) - Specifies if the font for this subtitle should be bold and/or italic.
; caption=(true/false) - Specifies if this subtitle is a closed caption. Will only appear if closed captioning is enabled.
; minvolume=(a number from 0.0-1.0) - Specifies the minimum volume of the sound effect for this subtitle to appear.
; cooldown=(time in seconds) - Specifies a cooldown for this subtitle. If this sound effect plays again while this cooldown is active, the subtitle will not be added. This is used to prevent repetitive sounds from flooding the screen.

